<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0c0b0a">
<title>巴柔武器库 · BJJ Arsenal</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🥋</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&family=Noto+Serif+SC:wght@400;700;900&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}

:root{
  /* Warm earthy palette — inspired by tatami mats and ink wash paintings */
  --bg-0:#0c0b0a;          /* deepest black with warmth */
  --bg-1:#141210;
  --bg-2:#1a1714;
  --bg-3:#221d18;

  --gold:#c9a961;          /* aged brass gold, less yellow more depth */
  --gold-bright:#e8d4a0;
  --gold-dim:rgba(201,169,97,0.10);
  --gold-line:rgba(201,169,97,0.25);

  --ink:#8a7d6f;           /* warm neutral for secondary text */
  --sumi:#4a4137;          /* deep ink for dividers */

  --text:#ede4d3;          /* warm off-white — not pure white */
  --text-dim:#a39585;      /* warm gray */
  --text-muted:#6d6258;
  --text-deep:#4a4137;

  /* Accent palette — muted and earthy, not neon */
  --c-red:#c44545;
  --c-red-bg:rgba(196,69,69,0.08);
  --c-blue:#5b8fb8;
  --c-blue-bg:rgba(91,143,184,0.08);
  --c-green:#7a9b5c;
  --c-green-bg:rgba(122,155,92,0.08);
  --c-purple:#9b7bb5;
  --c-purple-bg:rgba(155,123,181,0.08);
  --c-orange:#c8834a;
  --c-orange-bg:rgba(200,131,74,0.08);
  --c-cyan:#5ba89e;
  --c-cyan-bg:rgba(91,168,158,0.08);

  --card:rgba(255,248,230,0.025);
  --card-hover:rgba(255,248,230,0.04);
  --card-border:rgba(201,169,97,0.12);
  --card-border-hover:rgba(201,169,97,0.25);

  --font-sans:'Noto Sans SC','PingFang SC','Hiragino Sans GB',-apple-system,sans-serif;
  --font-serif:'Noto Serif SC','Cormorant Garamond',Georgia,serif;
  --font-display:'Cormorant Garamond','Noto Serif SC',Georgia,serif;
}

html{scroll-behavior:smooth}
body{
  font-family:var(--font-sans);
  background:var(--bg-0);
  color:var(--text);
  min-height:100vh;
  -webkit-font-smoothing:antialiased;
  -moz-osx-font-smoothing:grayscale;
  overflow-x:hidden;
  position:relative;
}

/* Subtle grain texture overlay */
body::before{
  content:'';
  position:fixed;inset:0;
  pointer-events:none;
  z-index:0;
  opacity:0.4;
  background:
    radial-gradient(ellipse at top,rgba(201,169,97,0.06),transparent 50%),
    radial-gradient(ellipse at bottom right,rgba(196,69,69,0.03),transparent 60%),
    radial-gradient(ellipse at bottom left,rgba(91,143,184,0.02),transparent 60%);
}
body::after{
  content:'';
  position:fixed;inset:0;
  pointer-events:none;
  z-index:1;
  opacity:0.015;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='3'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
}

button{font-family:var(--font-sans);cursor:pointer;border:none;background:none;color:inherit}
input{font-family:var(--font-sans)}
a{color:inherit;text-decoration:none}

.container{
  max-width:680px;
  margin:0 auto;
  padding:0 18px 40px;
  min-height:100vh;
  position:relative;
  z-index:2;
}

/* ══════ Animations ══════ */
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes pulse-ring{0%{transform:scale(0.95);opacity:0.8}70%{transform:scale(1.15);opacity:0}100%{transform:scale(1.15);opacity:0}}

.fade-up{animation:fadeUp .5s cubic-bezier(0.2,0.8,0.2,1) both}
.fade-in{animation:fadeIn .3s ease-out both}

/* ══════ Header ══════ */
.header{
  text-align:center;
  padding:36px 0 28px;
  position:relative;
}
.header::after{
  content:'';
  position:absolute;
  bottom:8px;left:50%;
  transform:translateX(-50%);
  width:48px;height:1px;
  background:linear-gradient(90deg,transparent,var(--gold-line),transparent);
}
.header .kanji{
  font-family:var(--font-serif);
  font-size:14px;
  color:var(--gold);
  letter-spacing:8px;
  opacity:0.6;
  margin-bottom:10px;
  font-weight:400;
}
.header h1{
  font-family:var(--font-display);
  font-size:42px;
  font-weight:600;
  letter-spacing:2px;
  background:linear-gradient(180deg,var(--gold-bright) 0%,var(--gold) 60%,#8a7239 100%);
  -webkit-background-clip:text;
  background-clip:text;
  -webkit-text-fill-color:transparent;
  line-height:1.1;
  margin-bottom:6px;
}
.header .zh-title{
  font-family:var(--font-serif);
  font-size:22px;
  font-weight:700;
  color:var(--text);
  letter-spacing:6px;
  margin-bottom:10px;
}
.header .sub{
  font-size:11px;
  color:var(--text-muted);
  letter-spacing:3px;
  font-weight:400;
  text-transform:uppercase;
}

/* ══════ Search ══════ */
.search-wrap{
  position:relative;
  margin-bottom:18px;
}
.search-icon{
  position:absolute;
  left:16px;top:50%;
  transform:translateY(-50%);
  color:var(--text-muted);
  font-size:14px;
  pointer-events:none;
}
.search-bar{
  width:100%;
  padding:13px 16px 13px 42px;
  border-radius:14px;
  border:1px solid var(--card-border);
  background:var(--card);
  color:var(--text);
  font-size:14px;
  outline:none;
  transition:all .25s;
  font-family:var(--font-sans);
}
.search-bar::placeholder{color:var(--text-muted);font-weight:400}
.search-bar:focus{
  border-color:var(--gold);
  background:var(--card-hover);
  box-shadow:0 0 0 3px rgba(201,169,97,.08);
}

/* ══════ Filter pills ══════ */
.filters{
  display:flex;
  gap:7px;
  margin-bottom:22px;
  justify-content:center;
  flex-wrap:wrap;
}
.filter-btn{
  padding:7px 16px;
  border-radius:100px;
  border:1px solid var(--card-border);
  background:transparent;
  color:var(--text-muted);
  font-size:12px;
  font-weight:500;
  transition:all .2s;
  letter-spacing:0.5px;
}
.filter-btn:active{transform:scale(.96)}
.filter-btn.active{
  border-color:var(--gold);
  background:var(--gold-dim);
  color:var(--gold);
  font-weight:700;
}

/* ══════ Stats ══════ */
.stats{
  display:flex;
  justify-content:center;
  align-items:center;
  gap:18px;
  margin-bottom:20px;
  font-size:11px;
  color:var(--text-muted);
  letter-spacing:1px;
  font-family:var(--font-serif);
  font-weight:400;
}
.stats .dot{
  width:3px;height:3px;
  border-radius:50%;
  background:var(--gold);
  opacity:0.5;
}

/* ══════ Position cards ══════ */
.pos-card{
  display:flex;
  align-items:center;
  gap:16px;
  padding:16px 18px;
  border-radius:16px;
  border:1px solid var(--card-border);
  background:var(--card);
  text-align:left;
  color:var(--text);
  width:100%;
  transition:all .2s cubic-bezier(0.2,0.8,0.2,1);
  margin-bottom:8px;
  position:relative;
  overflow:hidden;
}
.pos-card::before{
  content:'';
  position:absolute;
  left:0;top:0;bottom:0;
  width:3px;
  background:var(--gold);
  opacity:0;
  transition:opacity .2s;
}
.pos-card:active{
  transform:scale(.99);
  background:var(--card-hover);
  border-color:var(--card-border-hover);
}
.pos-card:active::before{opacity:1}
.pos-card .emoji{
  font-size:30px;
  flex-shrink:0;
  width:44px;
  text-align:center;
  filter:saturate(0.85);
}
.pos-card .info{flex:1;min-width:0}
.pos-card .name-row{
  display:flex;
  align-items:center;
  gap:8px;
  margin-bottom:3px;
  flex-wrap:wrap;
}
.pos-card .name{
  font-size:16px;
  font-weight:700;
  color:var(--text);
  letter-spacing:0.3px;
}
.pos-card .name-en{
  font-size:11px;
  color:var(--text-muted);
  font-family:var(--font-serif);
  font-style:italic;
  letter-spacing:0.5px;
  margin-top:1px;
}
.pos-card .meta{
  font-size:10px;
  color:var(--text-muted);
  margin-top:5px;
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  font-weight:500;
}
.pos-card .meta span{display:flex;align-items:center;gap:3px}
.pos-card .arrow{
  font-size:18px;
  color:var(--text-deep);
  flex-shrink:0;
  font-family:var(--font-serif);
  transition:transform .2s;
}
.pos-card:active .arrow{transform:translateX(3px);color:var(--gold)}

/* ══════ Tags ══════ */
.tag{
  font-size:10px;
  padding:2px 9px;
  border-radius:100px;
  font-weight:600;
  display:inline-block;
  white-space:nowrap;
  letter-spacing:0.5px;
  border:1px solid transparent;
}

/* ══════ Chain cards ══════ */
.chain-card{
  display:flex;
  align-items:center;
  gap:12px;
  padding:13px 15px;
  border-radius:13px;
  text-align:left;
  color:var(--text);
  width:100%;
  transition:all .2s;
  margin-bottom:6px;
  border:1px solid transparent;
}
.chain-card:active{transform:scale(.99)}
.chain-card .chain-name{
  font-size:14px;
  font-weight:600;
  color:var(--text);
}
.chain-card .chain-meta{
  font-size:11px;
  color:var(--text-muted);
  margin-top:2px;
  font-weight:400;
}

/* ══════ Back button ══════ */
.back-btn{
  display:inline-flex;
  align-items:center;
  gap:6px;
  color:var(--gold);
  font-size:13px;
  padding:14px 2px 14px 0;
  margin-top:8px;
  font-weight:500;
  letter-spacing:0.5px;
  transition:all .2s;
}
.back-btn:active{transform:translateX(-2px)}

/* ══════ Detail cards ══════ */
.detail-card{
  padding:22px;
  border-radius:18px;
  background:var(--card);
  border:1px solid var(--card-border);
  margin-bottom:18px;
  position:relative;
}

/* Hero card for position detail */
.hero-card{
  padding:24px;
  border-radius:20px;
  background:
    linear-gradient(135deg,rgba(201,169,97,0.04),rgba(201,169,97,0.01) 60%),
    var(--card);
  border:1px solid var(--card-border);
  margin-bottom:18px;
  position:relative;
  overflow:hidden;
}
.hero-card::before{
  content:'';
  position:absolute;
  top:-40px;right:-40px;
  width:120px;height:120px;
  background:radial-gradient(circle,rgba(201,169,97,0.08),transparent 70%);
  pointer-events:none;
}

/* Section titles */
.section-title{
  font-size:12px;
  font-weight:700;
  color:var(--gold);
  margin:24px 0 14px;
  letter-spacing:3px;
  text-transform:uppercase;
  display:flex;
  align-items:center;
  gap:10px;
}
.section-title::before{
  content:'';
  width:16px;height:1px;
  background:var(--gold);
  opacity:0.5;
}
.section-title.first{margin-top:0}

/* Key points */
.key-points-card{
  padding:18px 20px;
  border-radius:16px;
  background:linear-gradient(135deg,rgba(201,169,97,0.04),transparent);
  border:1px solid var(--gold-line);
  margin-bottom:24px;
}
.key-points-card .section-title{margin-top:0}
.key-point{
  display:flex;
  gap:12px;
  font-size:13px;
  line-height:1.8;
  margin-bottom:10px;
}
.key-point:last-child{margin-bottom:0}
.key-point .num{
  color:var(--gold);
  font-weight:700;
  flex-shrink:0;
  min-width:20px;
  font-family:var(--font-serif);
  font-size:14px;
}
.key-point .text{color:var(--text-dim);font-weight:400}

/* ══════ Step timeline ══════ */
.steps-wrap{
  padding:20px 22px;
  border-radius:16px;
  background:var(--card);
  border:1px solid var(--card-border);
  margin-bottom:18px;
}
.step{display:flex;gap:16px}
.step-dot-col{
  display:flex;
  flex-direction:column;
  align-items:center;
  width:28px;
  flex-shrink:0;
  padding-top:2px;
}
.step-dot{
  width:28px;height:28px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:12px;
  font-weight:700;
  flex-shrink:0;
  font-family:var(--font-serif);
  position:relative;
  z-index:1;
}
.step-line{
  width:1px;
  flex:1;
  min-height:18px;
  margin:4px 0;
  opacity:0.4;
}
.step-text{
  padding:4px 0 18px;
  font-size:14px;
  line-height:1.8;
  color:var(--text-dim);
  flex:1;
}
.step:last-child .step-text{padding-bottom:0}
.step-text .step-title{font-weight:700;margin-bottom:3px;color:var(--text);font-size:15px}
.step-text .step-detail{font-size:13px;color:var(--text-dim);line-height:1.75}

/* ══════ Tip box ══════ */
.tip-box{
  padding:16px 20px;
  border-radius:14px;
  background:
    linear-gradient(135deg,rgba(201,169,97,0.06),rgba(201,169,97,0.02));
  border:1px solid var(--gold-line);
  position:relative;
  margin-bottom:14px;
}
.tip-box .tip-label{
  font-size:11px;
  font-weight:700;
  color:var(--gold);
  margin-bottom:6px;
  letter-spacing:2px;
  text-transform:uppercase;
  display:flex;
  align-items:center;
  gap:6px;
}
.tip-box .tip-text{
  font-size:14px;
  line-height:1.9;
  color:var(--text-dim);
  font-weight:400;
}

/* ══════ Counter box ══════ */
.counter-box{
  padding:18px 20px;
  border-radius:14px;
  background:linear-gradient(135deg,rgba(122,155,92,0.06),rgba(122,155,92,0.02));
  border:1px solid rgba(122,155,92,0.18);
  margin-top:16px;
}
.counter-title{
  font-size:11px;
  font-weight:700;
  color:var(--c-green);
  margin-bottom:12px;
  letter-spacing:2px;
  text-transform:uppercase;
  display:flex;
  align-items:center;
  gap:8px;
}

/* ══════ Video buttons ══════ */
.video-row{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
  margin-top:14px;
}
.video-btn{
  flex:1;
  min-width:140px;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:7px;
  padding:12px 14px;
  border-radius:12px;
  font-size:13px;
  font-weight:600;
  transition:all .2s;
  border:1px solid;
  letter-spacing:0.3px;
}
.video-btn:active{transform:scale(.97)}
.video-btn.yt{
  background:rgba(196,69,69,0.08);
  border-color:rgba(196,69,69,0.25);
  color:var(--c-red);
}
.video-btn.bili{
  background:rgba(91,143,184,0.08);
  border-color:rgba(91,143,184,0.25);
  color:var(--c-blue);
}

/* ══════ Nav chips ══════ */
.nav-chips{
  display:flex;
  flex-wrap:wrap;
  gap:7px;
  margin-top:12px;
}
.nav-chip{
  padding:7px 13px;
  border-radius:10px;
  font-size:12px;
  font-weight:500;
  transition:all .2s;
  border:1px solid;
  display:inline-flex;
  align-items:center;
  gap:5px;
}
.nav-chip:active{transform:scale(.95)}

/* ══════ Category header ══════ */
.cat-header{
  display:flex;
  align-items:center;
  gap:10px;
  font-size:11px;
  font-weight:700;
  margin:18px 0 10px;
  letter-spacing:2.5px;
  text-transform:uppercase;
}
.cat-header::after{
  content:'';
  flex:1;
  height:1px;
  background:linear-gradient(90deg,currentColor,transparent);
  opacity:0.2;
}

/* ══════ Hero avatar ══════ */
.hero-emoji{
  font-size:48px;
  filter:saturate(0.85);
  line-height:1;
}
.hero-title-row{
  display:flex;
  align-items:center;
  gap:16px;
  margin-bottom:14px;
  position:relative;
}
.hero-name{
  font-size:24px;
  font-weight:700;
  color:var(--text);
  letter-spacing:0.3px;
  font-family:var(--font-serif);
  line-height:1.2;
}
.hero-name-en{
  font-size:12px;
  color:var(--text-muted);
  font-family:var(--font-serif);
  font-style:italic;
  margin-top:3px;
  letter-spacing:0.5px;
}
.hero-desc{
  font-size:14px;
  line-height:2;
  color:var(--text-dim);
  font-weight:400;
  margin:0;
}

/* Chain detail header */
.chain-hero{
  display:flex;
  align-items:center;
  gap:14px;
  margin-bottom:6px;
}
.chain-icon{
  font-size:28px;
  width:52px;height:52px;
  border-radius:14px;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-shrink:0;
  border:1px solid;
}
.chain-title{
  font-size:20px;
  font-weight:700;
  color:var(--text);
  font-family:var(--font-serif);
  letter-spacing:0.3px;
  line-height:1.3;
}
.chain-meta-row{
  display:flex;
  gap:10px;
  margin-top:6px;
  align-items:center;
  flex-wrap:wrap;
}
.chain-from{
  font-size:11px;
  color:var(--text-muted);
  font-family:var(--font-serif);
  font-style:italic;
}

/* ══════ Empty state ══════ */
.empty{
  text-align:center;
  padding:60px 20px;
  color:var(--text-muted);
}
.empty .icon{font-size:40px;opacity:0.3;margin-bottom:12px}
.empty .text{font-size:14px;font-family:var(--font-serif)}

/* ══════ Footer ══════ */
.footer{
  text-align:center;
  margin-top:48px;
  font-size:11px;
  color:var(--text-deep);
  line-height:2;
  padding-top:28px;
  border-top:1px solid var(--card-border);
  letter-spacing:1px;
  font-family:var(--font-serif);
}
.footer .kanji-mark{
  color:var(--gold);
  font-size:14px;
  letter-spacing:4px;
  margin-bottom:8px;
  opacity:0.6;
}

/* ══════ Related section ══════ */
.related-section{
  margin-top:28px;
  padding-top:24px;
  border-top:1px solid var(--card-border);
}
.related-label{
  font-size:11px;
  color:var(--text-muted);
  margin-bottom:12px;
  letter-spacing:2px;
  text-transform:uppercase;
  font-weight:600;
}

/* ══════ Video section ══════ */
.video-section{
  margin-top:18px;
}
.video-label{
  font-size:11px;
  color:var(--text-muted);
  margin-bottom:10px;
  letter-spacing:2px;
  text-transform:uppercase;
  font-weight:600;
}

/* ══════ Scrollbar ══════ */
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--sumi);border-radius:4px}
::-webkit-scrollbar-thumb:hover{background:var(--gold-dim)}

/* ══════ Tab Navigation ══════ */
.tab-bar{
  display:flex;
  gap:0;
  margin-bottom:20px;
  background:rgba(255,248,230,0.015);
  border:1px solid var(--card-border);
  border-radius:14px;
  padding:4px;
  position:sticky;
  top:0;
  z-index:10;
  backdrop-filter:blur(10px);
  -webkit-backdrop-filter:blur(10px);
}
.tab-btn{
  flex:1;
  padding:10px 4px;

delaRiva:{name:"德拉希瓦防守",en:"De La Riva Guard",role:"guard",emoji:"🪝",
desc:"一腿从外侧勾住对手前腿，另一脚踩髋部或大腿。现代竞技BJJ核心open guard之一。",
pts:["DLR hook要深：脚从小腿外侧穿过，脚背勾住大腿内侧","必须抓对手同侧脚踝防止抽腿","另一手抓袖口/裤腿保持第二控制点","非DLR脚踩髋部/二头肌/或贴地准备berimbolo","髋部保持活跃不停调整角度","DLR hook被抽出→立刻转其他guard"],
chains:[
{type:"sweep",name:"经典DLR扫",steps:["DLR hook深勾，手控脚踝+远侧裤腿","非DLR脚踩对手另侧髋部","DLR向外推+踩髋脚向内推","手配合拉拽→对手侧摔","跟到top"],tip:"双腿推拉配合——DLR往外拧+踩髋脚辅助方向",counter:{name:"DLR扫防御",steps:["被勾腿弯曲后撤半步","手压对手勾腿脚踝/裤脚","另一手控踩髋腿","解除后快速pass"]}},
{type:"transition",name:"Berimbolo反背",steps:["抓对手腰带/后裤腰","身体向后翻滚","DLR hook控制旋转到对手背后","建立seatbelt + hooks"],tip:"核心是用勾腿控制旋转——不是靠手拉",counter:{name:"Berimbolo防御",steps:["感觉翻转时压低重心","被勾腿用力踩地抵抗","控制对手髋部不让其转到身后"]}},
{type:"transition",name:"DLR直接反背",steps:["对手重心前移时","手抓腰带，身体向DLR hook方向旋转","穿过腿下方绕到背后","建立hook+seatbelt"],tip:"比berimbolo更直接——时机是对手重心前倾的瞬间",counter:{name:"防御",steps:["保持重心后坐","不要前倾给对手机会"]}},
{type:"sweep",name:"转X-Guard扫",steps:["非DLR脚插入对手两腿之间","两脚形成X","双手控脚踝","X腿上提+拉脚踝→举起扫倒"],tip:"DLR和X-Guard天然连接。对手重心前压时特别适合",counter:{name:"防御",steps:["对手插腿时迅速后撤","重心降低蹲稳","手下压控制不让形成X"]}},
{type:"submission",name:"脚锁入口 Ankle Lock",steps:["放弃DLR hook控制对手脚踝","夹入腋下进入Ashi Garami","前臂骨卡住跟腱","身体后仰+髋部上挺"],tip:"DLR是进入leg lock系统的重要入口",counter:{name:"脚锁逃脱",steps:["被攻击脚向对手身体方向踢","脚趾外旋减轻压力","另一脚踩髋制造空间后抽脚"]}},
]},

spiderGuard:{name:"蜘蛛防守",en:"Spider Guard",role:"guard",emoji:"🕷️",
desc:"双手抓袖口，双脚踩二头肌形成四点控制。Gi专用强力远距离guard。",
pts:["双手必须紧抓袖口——松开=放弃整个位置","脚踩二头肌（不是肘部），腿伸直制造最大张力","一旦对手break一个grip立刻重建或转guard","蜘蛛防守很累手——grip维持不住时及时转guard"],
chains:[
{type:"sweep",name:"蜘蛛扫 Spider Sweep",steps:["双控袖口+双踩二头肌","一腿伸直推另一腿弯曲收回","收回腿快速伸直推向对手同侧","对角线力量推倒→跟到top"],tip:"对角线力量：推的方向和拉的方向形成斜线",counter:{name:"防御",steps:["被推侧肘内收","重心后坐","先断一侧grip再pass"]}},
{type:"sweep",name:"Lasso扫",steps:["一脚从踩二头肌绕过手臂外侧缠绕上臂(lasso)","另一侧保持标准蜘蛛","lasso侧腿内拧限制手臂","双腿配合+手拉袖口翻向lasso侧"],tip:"Lasso缠绕要深——小腿完全绕过手臂",counter:{name:"防御",steps:["立刻用被lasso手肘向下抽出","重心后移不给对手拧力","另一手辅助剥离lasso"]}},
{type:"submission",name:"蜘蛛三角绞",steps:["一腿从踩二头肌高挂到对手颈部","制造一手进一手出条件","另一腿锁定三角","拉头调角度完成"],tip:"蜘蛛到三角是高频combo——你已控制双臂很容易制造条件",counter:{name:"逃脱",steps:["立刻坐直","被困肘插入对手大腿","站起+摔"]}},
{type:"submission",name:"Omoplata全臂锁",steps:["控制一侧袖口拉过中线","同侧腿穿过对手手臂上方","腿挂肩膀，身体旋转面朝地面","坐起前倾对肩关节施压"],tip:"旋转要快不给对手抽手机会",counter:{name:"逃脱",steps:["对手腿刚挂上时前滚翻化解","或向前走绕过头部","翻滚解除肩部锁定"]}},
{type:"transition",name:"转DLR",steps:["对手试图跨过你一条腿pass时","被跨腿转为DLR hook","手从袖口转抓裤腿/脚踝","进入DLR继续进攻"],tip:"Spider和DLR天然互转——高水平选手自如切换",counter:null},
]},

halfGuard:{name:"半防守",en:"Half Guard",role:"guard",emoji:"½",
desc:"双腿缠住对手一条腿。现代BJJ发展出knee shield、deep half、lockdown等丰富子系统。",
pts:["绝不平躺——侧身面对对手是生存基础","争取underhook——整个进攻体系的基石","被crossface压住→先用knee shield制造空间","下方腿主动缠紧不是被动等pass","随时准备转deep half或恢复full guard"],
chains:[
{type:"sweep",name:"老忠实扫 Old Faithful",steps:["Underhook深穿到腋下抓腰带/后背","头顶对手胸口","后腿勾住对手被缠腿","前脚踩地辅助","整体翻转到top"],tip:"Underhook要深+头位置正确+用整体力量翻",counter:{name:"防御",steps:["Whizzer压住underhook","Crossface控制头","用自由腿踩地维持底盘"]}},
{type:"transition",name:"Dog Fight→反背",steps:["拿到underhook后坐起进入dog fight","Underhook手爬到对手背后","身体下潜穿到对手侧面→背后","建立seatbelt+hooks"],tip:"Lucas Leite经典路线。不要在dog fight停留太久",counter:{name:"防御",steps:["Whizzer保持对手无法转身后","重心压低","对手开始绕后立刻坐下面向"]}},
{type:"sweep",name:"电梯扫 Elevator Sweep",steps:["外侧腿变成蝴蝶hook","上体贴紧拿住underhook","向underhook方向倾倒","hook上提翻转"],tip:"本质是在half guard里做蝴蝶扫",counter:{name:"防御",steps:["感觉hook插入时抽腿后撤","膝盖外顶破坏hook","Whizzer压紧+体重前倾"]}},
{type:"sweep",name:"Knee Shield进攻",steps:["建立knee shield抵住对手胸/肩","控制袖口+衣领","knee shield脚踩髋推开","可转arm drag→back take或butterfly hook→sweep"],tip:"Knee shield是half guard的安全模式——先稳定再决定路径",counter:null},
{type:"transition",name:"Deep Half入口",steps:["对手压力太大拿不到underhook时","身体潜到对手被缠腿下方","肩膀扛住大腿双手抱腿","进入deep half→多种扫技或back take"],tip:"Deep half是'被压了就往下钻'的策略",counter:null},
{type:"escape",name:"回到Full Guard",steps:["Knee shield创造空间","Shrimp远离","另一腿穿过建立full guard","锁闭脚踝"],tip:"退回full guard重来也完全可以",counter:null},
]},

// ──── GRIP FIGHTING ────
gripFighting:{name:"抢把体系",en:"Grip Fighting",role:"system",emoji:"🤝",
desc:"抢把（Grip Fighting）是BJJ中被严重低估的技能。谁先建立有利grip谁掌握主动权。这是所有guard work和passing的基础。",
pts:["先手优势：主动伸手抢把比被动防守更有效","断把（strip grip）优先级高于建立自己的grip","Gi抢把：袖口>衣领>裤腿>腰带（按优先级）","No-Gi抢把：collar tie > wrist > 2-on-1 > underhook","每次断把后立刻建立自己的grip——不要留空档","双手都被控制=极度危险——必须立刻断至少一个"],
chains:[
{type:"grip",name:"Gi袖口控制",steps:["四指在外拇指在内抓袖口","抓靠近手腕位置最有效","拉袖口向下→破坏对手姿势","拉袖口向侧→限制对手一侧手臂活动","配合脚踩二头肌→进入spider guard"],tip:"袖口是Gi柔术最重要的grip——控制袖口=控制对手手臂",counter:{name:"断袖口方法",steps:["用另一手握住自己被控手腕","向对手拇指方向猛拉抽出","或用脚踩对手抓握的手指方向剥离"]}},
{type:"grip",name:"衣领控制 Collar Grip",steps:["深抓对手后衣领（四指在内越深越好）","交叉抓领（cross collar）→绞技入口","同侧抓领→控制姿势+设置sweep","双手抓领→强力posture控制"],tip:"衣领越深威胁越大——深到手腕骨接触颈部就是绞技距离",counter:{name:"断衣领方法",steps:["双手抓住对手抓领的手腕向下拉脱","肘部内收缩小空间不让对手深入","另一手握住对手手腕朝其拇指方向剥离"]}},
{type:"grip",name:"No-Gi: Collar Tie",steps:["一手抓对手后颈（collar tie）","拉其头部向下→破坏姿势","配合另一手控制手腕/肘部","可以设置snap down/arm drag/前滚翻入guard"],tip:"No-Gi中collar tie相当于Gi的衣领控制",counter:{name:"Collar Tie防御",steps:["被抓后颈时立刻同侧手做frame推对手肘部","头部上抬抵抗下拉力","反手也抓对手后颈形成对称控制→谁先打破平衡谁赢"]}},
{type:"grip",name:"2-on-1 / Russian Tie",steps:["双手控制对手一只手臂","一手抓手腕一手抓肘/三头肌","将对手手臂拉过你身体","可以直接→arm drag→back take","或→duck under→back take"],tip:"2-on-1是No-Gi最强力的控制——对手一只手完全被废掉",counter:{name:"2-on-1防御",steps:["被控手臂立刻向身体收回","另一手抓住对手控制手的手腕","旋转身体面对对手","夺回手臂控制"]}},
{type:"grip",name:"Underhook/Whizzer战争",steps:["Underhook：手穿对手腋下抱背→进攻位","Whizzer：对手拿到underhook后的反控→手臂从外侧压住","Underhook>Whizzer是一般规律","但高水平whizzer可以反转局面→whizzer+hip switch→back take"],tip:"Underhook vs Whizzer是半防守和站立中最重要的对抗",counter:null},
{type:"grip",name:"Pant Grip裤腿控制",steps:["抓对手膝盖附近裤腿","限制对手腿部移动","配合另一手控制→多种sweep入口","DLR中抓脚踝是必要控制"],tip:"裤腿控制是扫技的隐藏钥匙——很多sweep靠裤腿grip完成",counter:{name:"断裤腿方法",steps:["被抓裤腿侧腿猛力后撤","手向下掰对手手指方向剥离","后撤同时前进施压pass"]}},
]},

// ──── PIN / CONTROL ────
sideControl:{name:"侧面控制",en:"Side Control",role:"top",emoji:"⬛",
desc:"身体垂直压在对手胸部上方。最常见的控制位，向多方向transition和submission选项丰富。",
pts:["体重沉在对手胸口——胸对胸压力","Crossface控制对手头朝向","膝盖顶住近侧髋部阻止转身","先稳定再进攻","用小幅度调整维持压力"],
chains:[
{type:"submission",name:"美国锁 Americana",steps:["对手远侧手臂放地面时","按住手腕压地形成L形","另一手穿过手臂下方","Figure-4锁→肘为支点弧线提腕"],tip:"肘部必须固定在地面。发力方向是弧线不是直线提",counter:{name:"逃脱",steps:["被攻击手抓自己腰带锚定","另一手推对手肘解除figure-4","Bridge+抽手→frame防御"]}},
{type:"submission",name:"木村锁 Kimura",steps:["控制近侧手腕","从上臂外侧穿过figure-4","可能需step over头部增控","身体旋转力量完成"],tip:"力量来自身体转动。Finish不了→Kimura grip本身也是好控制",counter:{name:"逃脱",steps:["手臂贴紧身体不给角度","抓自己Gi锚定","翻身减压+shrimp"]}},
{type:"submission",name:"棒球棒绞 Baseball Bat",steps:["一手深抓远侧衣领（四指朝内）","另一手抓近侧衣领（四指朝外）","双手如握棒球棒","滑到N/S方向→胸口压低收手完成"],tip:"很多人在pass过程中就埋好grip到位直接finish",counter:{name:"逃脱",steps:["感觉抓领时立刻掰开grip","下巴内收","向对手移动方向转身减压"]}},
{type:"submission",name:"纸切绞 Paper Cutter",steps:["侧控位，一手深抓对手远侧衣领","另一手从对手颈后穿过抓近侧衣领","肘部夹紧对手颈部两侧","向对手头顶方向施压","Gi衣领勒紧颈动脉完成绞杀"],tip:"非常隐蔽的绞技——对手常常意识不到就被绞晕",counter:{name:"纸切绞防御",steps:["双手抓住对手深入衣领的手腕","下巴内收","bridge+shrimp逃出侧控"]}},
{type:"submission",name:"手臂三角 Arm Triangle (Side)",steps:["对手一只手臂被夹在你和他的头之间","你的头压住对手同侧肩膀","双手合握如kimura grip","滑到对手头顶方向（technical stand-up position）","身体压向对手——他自己的肩膀绞他"],tip:"Side control到arm triangle是BJJ最经典combo之一",counter:{name:"Arm Triangle逃脱",steps:["感觉手臂被夹时立刻伸直抽出","向被困侧翻身减轻压力","如果已锁紧→对手向你头顶滑时尽快tap，否则可能晕厥"]}},
{type:"submission",name:"片固 Kata Gatame",steps:["从侧控转为袈裟固类似位置","一手从对手头下穿过","另一手从对手手臂外侧绕过","双手合握","肘部夹紧头+手臂","身体向一侧倾斜"],tip:"源自柔道的经典押え込み技——压力大finish率高",counter:{name:"Kata Gatame逃脱",steps:["被困手臂尝试抽出","向对手后方bridge","下巴内收"]}},
{type:"transition",name:"过渡Mount",steps:["体重移到上体","远侧膝盖沿地面滑过","越过腹部到另一侧","坐稳mount"],tip:"过渡时胸口压力不中断——抬身对手就插膝盖",counter:{name:"防御",steps:["膝盖滑过时肘膝连接","膝盖顶住来的腿","Shrimp制造空间→half guard"]}},
{type:"transition",name:"KOB膝盖压腹",steps:["侧控提起上体","近侧膝盖放对手腹部","另一脚外撑","一手控领一手抓裤"],tip:"KOB是逼迫反应的位置——每种反应都有对应进攻",counter:{name:"KOB逃脱",steps:["双手推膝盖向远侧","同时髋部转向对手","推过身体恢复guard"]}},
{type:"transition",name:"N/S南北位",steps:["向对手头部旋转180度","胸口压住脸部","双手控手臂","可上N/S choke"],tip:"旋转时贴着身体。N/S压力非常窒息",counter:null},
]},

chains:[

{type:"escape",name:"翻桥逃脱 Bridge & Roll",steps:["控制对手远侧手臂拉到身边","同侧脚勾对手同侧腿","爆发bridge向被控侧","翻到top"],tip:"时机：对手专注attack时重心前移",counter:null},
{type:"escape",name:"Ghost Escape幽灵逃脱",steps:["对手从侧控转向N/S时","利用旋转瞬间空间","身体向同方向滑出","从对手身下穿出→恢复guard或背后"],tip:"顺着对手的旋转走——像'顺水游'",counter:null},
{type:"escape",name:"Underhook逃脱",steps:["近侧手穿到对手腋下拿underhook","身体侧身","Underhook力量从下方穿出","到dog fight/half guard/single leg"],tip:"拿到underhook=拿到生命线",counter:null},

chains:[

{type:"submission",name:"Americana from Kesa",steps:["近侧手臂被夹腋下","腾出手按手腕向地面","Figure-4锁","利用体重提腕"],tip:"Kesa控制力极强对手很难防守americana",counter:{name:"逃脱",steps:["手抓自己腰带锚定","另一手推解figure-4"]}},
{type:"transition",name:"过渡标准侧控",steps:["松开搂头→移到crossface","夹臂改为控远侧","旋转为垂直侧控","膝盖顶髋"],tip:"Kesa submission打不出→转标准侧控重新布局",counter:null},

]},

{type:"escape",name:"抽手→反背",steps:["被困手臂向下（朝自己髋部）抽","配合bridge制造空间","手自由后立刻建立frame","shrimp→恢复guard 或 绕到对手背后"],tip:"手臂自由后不要停——立刻进入下一步",counter:null},
{type:"escape",name:"坐起反控",steps:["自由手绕到对手后方抓腰带","用grip辅助坐起来","身体向对手背后移动","打破kesa控制"],tip:"需要core力量和时机——对手放松压力瞬间坐起",counter:null},

// ──── MOUNT ────
mount:{name:"骑乘",en:"Mount",role:"top",emoji:"👑",
desc:"坐在对手腰腹上方。仅次于背控的最强位置，重力完全站在你这边。",
pts:["髋部下沉膝盖夹紧","低位mount先稳定→逐渐向高位mount移动","不要双手撑地","对手手放哪你就攻击哪"],
chains:[
{type:"submission",name:"Armbar from Mount",steps:["向高位mount移动","控制目标手腕","攻击侧脚踩头旁","另一腿过脸","后倒夹紧髋上顶"],tip:"Mount armbar最关键是不要丢位置——腿夹紧",counter:{name:"逃脱",steps:["被控手弯曲抓自己另一手","向被攻击侧翻身","手臂沿腿滑出"]}},
{type:"submission",name:"S-Mount Armbar",steps:["从普通mount向S-mount过渡","一腿蜷在对手头旁（形成S形）","另一腿伸过对手腋下","此时已经锁住对手一只手臂","后倒完成armbar","S-mount是mount armbar的最强起始位"],tip:"职业选手的mount armbar都从S-mount开始——比直接armbar finish率高3倍",counter:{name:"S-Mount逃脱",steps:["感觉对手腿蜷起时立刻做trap & roll","不要让对手腿过到你腋下","被锁时hitchhiker escape（被控手指向头部）"]}},
{type:"submission",name:"Cross Choke十字绞",steps:["一手深插远侧衣领","另一手也抓衣领","X形交叉","肘内收前臂骨顶颈两侧"],tip:"Roger Gracie凭这一招横扫——因为第一手永远够深",counter:{name:"防御",steps:["双手拉对手深入的手腕","不让第二手也进衣领","Bridge把手掰出"]}},
{type:"submission",name:"Ezekiel绞",steps:["一手从头下穿到另侧","穿过的手抓自己袖口内侧","被抓袖口手刀横切喉咙","穿过手上提+切的手下压"],tip:"Mount隐藏杀招——对手全力防cross choke时不预料",counter:{name:"逃脱",steps:["双手推前臂远离颈","下巴内收","Trap & Roll逃脱mount"]}},
{type:"submission",name:"手臂三角 Arm Triangle",steps:["Mount位，对手一只手放在自己脸旁","一手将对手手臂推过其脸","身体滑到side control（mounted arm triangle→standard）","头夹住对手肩膀和自己手臂","向对手头顶方向滑步+施压","对手自己的肩膀压迫自己颈动脉"],tip:"对手防cross choke把手护脸时的经典反击——你推他的手帮他绞自己",counter:{name:"Arm Triangle逃脱",steps:["感觉到手臂被推时立刻抓紧","防止对手将手推过脸","如果已被推过——向被困手方向翻身减轻压力"]}},
{type:"submission",name:"Ude Gatame从Mount",steps:["Mount时对手伸直手推你","抓住对手手腕不放","身体向该手方向旋转","用胸口压住对手肘部","身体后倒+髋部上顶","对手的伸直手变成armbar目标"],tip:"对手一旦伸直手臂就是送的——这个submission专治伸直手推mount的防御",counter:{name:"Ude Gatame防御",steps:["Mount下位绝不要伸直手推——肘贴身","感觉手被抓立刻弯曲收回","向被控手侧翻身"]}},
{type:"transition",name:"Technical Mount技术骑乘",steps:["对手试图向一侧翻逃脱mount时","顺势让对手翻到侧身","你坐到对手背上形成technical mount","双手从seatbelt位置控制","从这里→RNC或转回标准mount"],tip:"Technical mount是mount到背控的桥梁——比强行控制mount更聪明",counter:{name:"Technical Mount防御",steps:["翻身时不要翻过度","保持肘部夹紧","尝试回到面朝上的标准mount下位"]}},
{type:"transition",name:"Back Take",steps:["对手翻身趴下试图逃脱时","顺势滑到背后","建立seatbelt+hooks"],tip:"对手翻身=送背。故意施压让对手想翻身然后顺势拿",counter:null},
]},

mountBottom:{name:"被骑乘逃脱",en:"Mount Bottom",role:"bottom",emoji:"😫",
desc:"被骑乘是最危险位置之一。保护手臂颈部、系统逃脱。",
pts:["T-Rex手臂：肘贴身。绝不伸直推","逃脱优先：肘膝逃脱(高%)>trap&roll(爆发)","保持呼吸不恐慌"],
chains:[
{type:"escape",name:"肘膝逃脱 Elbow-Knee",steps:["肘部护身两侧","一侧肘向下和膝盖连接","Small bridge制造空间","Shrimp膝盖插入→half guard","连续3-4次即可逃出"],tip:"最高百分比——即使对方比你大很多也能用",counter:null},
{type:"escape",name:"陷阱翻桥 Trap & Roll",steps:["同侧手抓对手手腕","同侧脚勾对手脚","两个控制点到位后","爆发bridge向被困侧翻转"],tip:"手脚必须同时trap。最佳时机是对手伸手attack时",counter:null},
{type:"escape",name:"高位Mount降级",steps:["对手到高位mount（坐胸口）","不要急着逃——先推回低位","双手推膝盖/髋+shrimp","回到低位后执行标准逃脱"],tip:"高位→低位→逃脱是正确策略",counter:null},
]},

// ──── BACK ────
backControl:{name:"背部控制",en:"Back Control",role:"top",emoji:"🏆",
desc:"BJJ王者位置。对手看不到你、无法有效防守。",
pts:["Seatbelt：choking hand过肩绕颈+另一手穿腋下","双hooks脚跟勾大腿内侧","身体偏向choking hand侧","Body triangle是hooks的高阶替代"],
chains:[
{type:"submission",name:"裸绞 RNC",steps:["Choking hand需绕过颈部——最难一步","方法：拨手/强行插/切换角度创造空间","前臂贴紧颈动脉","Choking手放另一手二头肌","另一手放后脑","夹肘+胸口前挺完成"],tip:"力量来自胸口膨胀+肘内收不是手臂挤",counter:{name:"RNC逃脱",steps:["双手抓choking hand手腕下拉","下巴内收到锁骨","向choking hand方向转","拉到下巴以下后转身面对"]}},
{type:"submission",name:"弓箭绞 Bow & Arrow",steps:["Choking hand深抓远侧衣领","另一手抓同侧裤腿膝弯处","取出一侧hook踩髋","身体向后伸展——拉领+拉腿如拉弓","颈部被衣领绞紧"],tip:"Finish率最高的绞杀之一。衣领grip至少过对手中线",video:"https://www.youtube.com/results?search_query=bow+and+arrow+choke+bjj",counter:{name:"弓箭绞逃脱",steps:["第一时间双手抓衣领hand手腕下拉","身体向对手方向旋转减轻拉力","背部平贴地面消除弓的张力","趁角度失效转身面对"]}},
{type:"submission",name:"Collar Choke",steps:["RNC绕不过时直接抓衣领","前臂骨顶颈一侧","另一手辅助拉领或抱头","身体偏移施压"],tip:"不一定非要RNC——collar choke从背后也非常有效",counter:null},
{type:"submission",name:"袖车弓箭绞 Sleeve Bow & Arrow",steps:["背控+choking hand已抓对手远侧衣领","不抓裤腿——而是抓对手同侧手的袖口","一手拉领一手拉袖","对手的手臂被拉过头→自己的衣领勒紧自己","身体后仰如拉弓","压力同时来自衣领+对手自己的手臂"],tip:"袖车版本的bow&arrow——对手甚至无法用手防御，因为手本身就是绞杀工具的一部分",counter:{name:"袖车弓箭绞逃脱",steps:["感觉到手腕被抓时立刻用力回抽","另一手去抓对手衣领grip","转身面对对手逃脱","这个submission最好的防御是不让对手抓到袖口"]}},
{type:"submission",name:"十字绞（背后）Cross Choke from Back",steps:["双手同时抓对手衣领（一深一浅）","双手交叉形成X","不需要hooks可以直接施压","对手转身也绞——而且转身会更紧","经典gi背后绞技"],tip:"Roger Gracie标志性技术——甚至不需要hook配合，双手grip就能finish",counter:null},
{type:"transition",name:"丢背控→Mount",steps:["对手摘hooks开始转身时","顺势让对手翻到面朝上","直接到mount"],tip:"丢背控≠失败——过渡mount仍在上位",counter:null},
]},

backBottom:{name:"被背控逃脱",en:"Back Bottom",role:"bottom",emoji:"🆘",
desc:"最危险下位。保护颈部>清除hooks>滑脱。",
pts:["双手保护颈部——至少一手在下巴和choking hand之间","向choking hand侧滑落——反直觉但正确","背靠地面相对安全","不要趴下——更容易被绞"],
chains:[
{type:"escape",name:"经典滑落",steps:["双手紧贴下巴保护颈","向choking hand方向移动","肩膀落向地面","滑到对手身侧","继续转身面对→guard"],tip:"用肩膀压住choking手臂。本能往另一侧逃反而把脖子送过去",counter:null},
{type:"escape",name:"清除Hooks",steps:["保护颈部","脚依次剥离hooks","踩住一脚固定","向被踩方向旋转","另一hook脱落→转身面对"],tip:"一次清一个hook",counter:null},
{type:"escape",name:"防弓箭绞",steps:["感觉对手抓衣领时","同侧手立刻抓自己衣领不给空间","另一手控制对手正在抓领的手","转身面对→guard"],tip:"核心是不让第一手深入衣领",counter:null},
]},

turtle:{name:"龟缩",en:"Turtle",role:"bottom",emoji:"🐢",

{type:"escape",name:"Granby Roll",steps:["肩膀着地前滚翻","穿过控制→面对对手","恢复guard"],tip:"用肩膀和上背滚动。Eduardo Telles标志性技术",counter:null},
{type:"transition",name:"技术站立",steps:["一手撑地","同侧脚前踏","站起面对对手"],tip:"起身时不要背对对手",counter:null},
{type:"transition",name:"Peterson Roll",steps:["对手从侧面控制turtle时","手从对手腿下穿过抓大腿","肩膀着地滚动","翻到top"],tip:"Wrestling经典技术",counter:null},
]},

northSouth:{name:"南北位",en:"North-South",role:"top",emoji:"⬆️",
desc:"头对头压制。侧控常见延伸，压力极大。",
pts:["胸对胸压住——体重全施加在对手胸口和脸","双手控手臂防frame","髋部低沉"],
chains:[
{type:"submission",name:"N/S Choke",steps:["手从颈侧绕过前臂贴紧","身体偏移choking hand方向","全身下沉","用体重+手臂完成blood choke"],tip:"Marcelo Garcia标志性submission",counter:{name:"逃脱",steps:["转头面向另侧","双手frame推肩","Shrimp向一侧逃出→guard"]}},
{type:"submission",name:"Kimura from N/S",steps:["控制一侧手臂figure-4","身体旋转回侧控方向","施加扭转力"],tip:"对手手臂已在控制范围很难收回",counter:null},
{type:"transition",name:"回到侧控/转另一侧",steps:["向一侧旋转→回该侧标准侧控","或旋转180度到另一侧"],tip:"N/S↔侧控自由切换消耗体力打乱防御节奏",counter:null},
]},

// ──── LEG LOCK SYSTEM ────
legLocks:{name:"腿锁体系",en:"Leg Lock System",role:"system",emoji:"🦿",
desc:"现代BJJ最革命性的技术发展。从Ashi Garami（腿纠缠位）出发，攻击对手膝盖、脚踝、脚跟的完整体系。Danaher Death Squad将其系统化。",
pts:["核心概念：先建立位置（Ashi Garami）再攻击","Standard Ashi：内侧腿控制对手髋，外侧腿勾对手大腿","Outside Ashi (Saddle/411)：你的腿从外侧纠缠→更强控制","50/50：双方互相纠缠→对称位置","IBJJF规则：白蓝带只允许straight ankle lock；棕黑带才允许heel hook","Inside heel hook比outside更危险——训练时务必注意安全"],
chains:[
{type:"submission",name:"直脚锁 Straight Ankle Lock",steps:["进入Standard Ashi Garami","将对手脚踝夹在腋下","前臂骨（桡骨）卡住跟腱上方","身体后仰+髋部上挺","保持对手脚趾朝外旋转增加效果"],tip:"IBJJF所有带级别都允许。关键是腋下要夹紧+前臂位置正确",counter:{name:"直脚锁逃脱",steps:["被攻击脚向对手身体方向踢/推","脚趾外旋减轻跟腱压力","另一脚踩对手髋部制造空间","将脚从腋下抽出→立刻站起pass"]}},
{type:"submission",name:"Inside Heel Hook",steps:["进入Outside Ashi / Saddle / 411","双腿形成三角锁控制对手膝盖","一手抓对手脚跟（heel）","另一手辅助控制脚掌","向身体内侧旋转脚跟→攻击膝韧带"],tip:"最危险的腿锁——对膝韧带伤害极大。训练时catch & release不要真锁",counter:{name:"Inside Heel Hook逃脱",steps:["第一时间：膝盖和脚趾朝同一方向（不给扭转角度）","尝试将被控制的腿直线抽出","另一脚踩对手髋部辅助脱离","boot方法：旋转脚踝将脚跟从对手握中抽出"]}},
{type:"submission",name:"Outside Heel Hook",steps:["从Standard Ashi或50/50","控制对手脚跟","向身体外侧旋转→攻击膝外侧韧带","身体后仰增加力矩"],tip:"比inside稍温和但仍然非常危险",counter:{name:"Outside Heel Hook逃脱",steps:["同inside：膝和脚趾同向","直线抽腿","踩髋制造空间","boot脚跟脱出"]}},
{type:"submission",name:"Kneebar膝十字",steps:["从Ashi或passing过程中控制对手一条腿","将对手膝盖夹在你的双腿/髋之间","前臂卡在对手小腿上方","身体后仰如做armbar但对象是腿","髋部上挺对膝关节施压"],tip:"Kneebar=腿的armbar。角度和控制是关键",counter:{name:"Kneebar逃脱",steps:["被攻击腿立刻弯曲不让对手伸展","膝盖方向转向对手减轻压力","另一脚蹬对手髋部制造空间","抽出腿后立刻站起"]}},
{type:"submission",name:"Toe Hold扭趾锁",steps:["控制对手脚掌","一手抓脚趾方向形成figure-4","另一手从脚底穿过握住","如同kimura但对象是脚踝","向内旋转施压"],tip:"可以从很多位置切入——50/50、half guard top等",counter:{name:"Toe Hold逃脱",steps:["被控脚立刻伸直+脚趾外旋","减少对手可以施力的角度","另一脚辅助推开","抽出脚后建立距离"]}},
{type:"transition",name:"进入Leg Lock的入口",steps:["从DLR→释放hook进入SLX/X-guard→Ashi","从half guard bottom→对手pass时缠腿→outside ashi","从top→对手做inverting逃脱时→抓腿进入ashi","从50/50→比赛中常见","Standing→imanari roll→直接进入ashi garami"],tip:"腿锁不是独立系统——要和整个BJJ game融合。最好的leg locker也有很强的passing和guard",counter:null},
]},

// ──── BERIMBOLO ────
berimbolo:{name:"Berimbolo详解",en:"Berimbolo System",role:"system",emoji:"🌀",
desc:"从DLR位发动的翻滚式Back Take。Miyao兄弟和Rafael Mendes的看家技术。现代lightweight竞技BJJ的核心武器。",
pts:["本质：用DLR hook控制对手一条腿，通过倒翻滚到对手身后","不是靠力量——是靠角度、时机和髋部灵活性","Berimbolo=进入系统，不只是一个单独技术","从berimbolo位置可以→back take / leg drag / kiss of dragon / crab ride","对手常见防御是面向你+base好→需要连续攻击打破","需要大量drilling——不是看一次就能用的技术"],
chains:[
{type:"transition",name:"经典Berimbolo→Back Take",steps:["从DLR位置，DLR hook深勾","双手抓对手裤腿/腰带","向后翻滚（向DLR hook反方向倒）","DLR hook保持控制引导旋转","穿到对手身体下方→背后","建立seatbelt grip","插入hooks完成back control"],tip:"核心是髋部灵活性和hook的控制力。滚的时候不要松开hook",counter:{name:"Berimbolo防御",steps:["感觉对手开始翻转→立刻压低重心蹲稳","被勾腿用力踩地抵抗旋转","双手控制对手髋部","如果已半转过去→立刻面向对手+跪稳base"]}},
{type:"transition",name:"Kiss of the Dragon",steps:["从DLR被对手pass时（反向berimbolo入口）","对手knee cut pass过程中","你的DLR hook保持","从对手腿下方倒穿到另一侧","出来时直接在对手背后","建立back control"],tip:"名字很酷的技术。本质是berimbolo的防御性变体——在被pass的过程中完成back take",counter:{name:"防御",steps:["Knee cut pass时注意对手DLR hook是否还在","如果还在→先清除hook再完成pass","完成pass后立刻建立crossface控制"]}},
{type:"transition",name:"Crab Ride控制",steps:["Berimbolo翻滚到对手背后但","对手四肢着地不让你插hooks时","双脚勾住对手大腿外侧（crab hooks）","手控制对手腰/腰带","从crab ride→可以做back take / leg drag / truck"],tip:"Crab ride是berimbolo到back take之间的重要中转站",counter:{name:"Crab Ride逃脱",steps:["立刻坐下不给对手控制空间","肘夹紧膝盖","Granby roll或sit-out逃出"]}},
{type:"sweep",name:"Berimbolo→Leg Drag",steps:["Berimbolo翻滚过程中","如果back take不成功","利用已有的位置和momentum","控制对手一条腿拖到身体另一侧（leg drag）","完成pass到side control"],tip:"Berimbolo不一定非要拿到back——leg drag也是优秀的结果",counter:{name:"Leg Drag防御",steps:["被拖腿立刻收回","髋部面向对手","建立knee shield或重建guard"]}},
{type:"sweep",name:"Berimbolo扫技",steps:["翻滚过程中对手base很好拿不到背","利用翻滚momentum","将对手向一侧扫倒","跟到top position"],tip:"拿不到back也没关系——扫到top也是好结果",counter:null},
]},

// ──── GAME PLAN 比赛思维 ────
gamePlan:{name:"🧠 比赛思维 Game Plan",en:"Game Plan & Decision Making",role:"system",emoji:"🧠",
desc:"从'打到哪算哪'到'每一步都有目的'。Game Plan不是死记套路，而是在每个位置都有一个清晰的优先级列表：我在这里→我要去哪里→我用什么技术到达。",
pts:["Game Plan = 位置目标 + 技术路径 + if/then决策","每个位置只需要2-3个你最熟练的技术选项就够了","不是记住100个技术——而是把5个技术练到本能反应","对练前给自己设一个当天课题：比如'今天只练从侧控过渡到mount'","高手的'规划感'其实是大量重复后形成的自动决策，不是临场计算"],
chains:[
{type:"control",name:"Gi上位Game Plan总路线",steps:["开局：站立→拉guard或takedown（你擅长上位，目标是到top）","到达top后第一目标：建立稳定的侧控（不要急着attack）","侧控稳定后→选择：①过渡Mount ②KOB逼反应 ③直接submission","到达Mount后→选择：①Cross choke ②Armbar ③如果对手翻身→拿背","背控→RNC或弓箭绞finish","全程思维：位置>submission。先到好位置，submission自然会来"],tip:"这就是你的'地图'——每次对练脑子里跑这条线",counter:null},
{type:"control",name:"侧控决策树（你在侧控时）",steps:["第一优先：稳定位置——crossface+膝顶髋+体重下沉","观察对手反应→对手不动：尝试过渡mount","对手远侧手放地面→Americana机会","对手近侧手推你→Kimura机会","对手转身面向你→准备对手恢复half guard→重新pass","对手暴露颈部→棒球绞或N/S choke","记住：对手的每个防御动作都在给你一个进攻入口"],tip:"关键思维转变：不是'我要做什么'而是'对手给了我什么'",counter:null},
{type:"control",name:"Mount决策树（你在骑乘时）",steps:["刚到mount→低位稳定5秒不要急","对手双手护颈(T-Rex)→向高位mount爬→Ezekiel绞或S-mount armbar","对手手推你胸口→抓住手腕→Americana","对手一只手放地面→控制该手腕→Armbar","对手试图bridge翻你→降低重心base住→等他累了再进攻","对手翻身趴下→顺势拿背→RNC","对手啥都不做→慢慢往高位爬→Cross choke"],tip:"Mount的哲学：你不需要急——重力和时间都站在你这边",counter:null},
{type:"control",name:"被下位时的生存计划",steps:["被takedown/pass→不要恐慌→立刻frame","被侧控→第一反应：frame+shrimp→恢复half guard","被mount→T-Rex防守→elbow-knee逃脱→恢复half guard","被背控→保护颈部→向choking hand滑落","恢复到half guard后→争取underhook→回到你的Game Plan","核心原则：每次都回到half guard作为'安全屋'然后反攻"],tip:"逃脱不是目的——逃脱是为了回到你能进攻的位置",counter:null},
{type:"transition",name:"对练前的3个问题",steps:["问自己：①今天练什么位置？（比如：侧控→mount过渡）","②我到了那个位置要尝试什么？（比如：cross choke+armbar二择）","③如果失败了我的B计划是什么？（比如：回到侧控重来）","每次对练只聚焦1-2个课题——不要贪多","结束后回顾：我做到了吗？哪里卡住了？"],tip:"刻意练习>无目的rolling。一个月聚焦一个课题，比每天打三个位置进步快10倍",counter:null},
]},

// ──── BOTTOM GAME PLAN ────
bottomGamePlan:{name:"🔻 下位打法规划",en:"Bottom Game Plan",role:"system",emoji:"🔻",
desc:"被放到下位不是末日——而是另一种进攻机会。下位的核心思维：不是'我被压着'而是'我在一个主动的防守位'。高手在下位时眼睛是亮的，因为他们知道接下来要做什么。",
pts:["下位的等级（从坏到好）：被背控 < 被mount < 被侧控 < 被浮固 < half guard < full guard < open guard","永远不要在差位置停留——每秒都在向更好的位置移动","下位最怕的不是被压——是'静止'和'用力挣扎'","下位要学会'借力'：对手施压的方向就是你该扫/逃的反方向","下位选手的Game Plan核心：Guard Retention（守住guard）>> Sweep（扫到top）>> Submit（下位提交）"],
chains:[
{type:"control",name:"下位总路线（从坏到好）",steps:["如果在最差位（被背控/mount）→优先逃脱到侧控下位或half guard","到half guard后→停下来建立frame和underhook","从half guard→尝试老忠实扫/dog fight/或退回full guard","到full guard→break对手posture→进攻submission或sweep","扫成功→跟到top→切换到上位Game Plan","每一步都有明确目标——不要在坏位置'打着看'"],tip:"下位思维：'我现在在哪？下一个更好的位置是哪里？'",counter:null},
{type:"control",name:"Closed Guard决策树（你在封闭防守）",steps:["第一优先：Break posture——把对手姿势拉下来","对手被拉下来了→尝试：①十字固（控手腕）②三角绞（推一手抓对手手腕）","对手低头前倾→抓断头台","对手坐直起来→打开guard变open/hip bump sweep","对手站起来→立刻打开guard变DLR或蜘蛛——不要硬挂","记住：Closed guard不是'躺平'——是'猎人蹲守'"],tip:"Break posture是一切的前提。没break掉就盲目尝试submission=浪费体力",counter:null},
{type:"control",name:"Half Guard决策树（你在半防守）",steps:["第一优先：侧身+争取underhook","拿到underhook→①老忠实扫 ②dog fight反背","对手防你的underhook用whizzer→转deep half guard","对手用crossface压你→knee shield创造空间→shrimp回full guard","对手站起来→抓single leg","被underhook压死→用knee shield稳住先，不要硬顶"],tip:"Half guard不是'被pass一半'——是'主动的进攻位'。白带把它当防守，蓝带当进攻",counter:null},
{type:"control",name:"Open Guard决策树（对手站立时）",steps:["对手站立→立刻建立DLR/蜘蛛/lasso（根据抓把和距离）","有DLR hook+双grip→经典DLR扫","对手拉开你的grip→转X-guard或SLX","对手重心前压→扫","对手重心后坐→用脚管理距离不要让他pass","grip维持不住→坐起来stand up，不要挂着被绕过"],tip:"Open guard是grip fighting——谁先拿到主动grip谁赢",counter:null},
{type:"control",name:"下位到上位的路径",steps:["下位的终极目标不是submission是——扫到上位","最高百分比路径：①half guard+underhook→老忠实扫","②DLR+双grip→DLR扫","③蝴蝶防守+underhook→蝴蝶扫","④Closed guard+对手posture→hip bump sweep","扫成功后跟进方向：优先跟到侧控→然后回到你的上位Game Plan"],tip:"记住4条最高%路径——这就是你的下位'主菜单'",counter:null},
{type:"transition",name:"Guard Retention核心",steps:["Retention>Recovery——守住比被pass后恢复容易10倍","核心1：髋部灵活度——脚始终追踪对手位置","核心2：frame——被压时用骨骼（前臂、胫骨）挡住对手，不用肌肉","核心3：不要躺平——保持侧身或坐起","核心4：腿至少一只接触对手——完全分开=被pass的开始","核心5：被pass到侧控前的最后时机→shrimp+插膝盖→half guard"],tip:"Retention训练比任何submission都有用——守得住guard=游戏还在继续",counter:null},
]},

// ──── NO-GI TECH ────
nogiSystem:{name:"🥋 No-Gi技术流",en:"No-Gi System",role:"system",emoji:"🥋",
desc:"No-Gi（无道服）是现代BJJ增长最快的方向，也是进入MMA和sub-only比赛的基础。没有grip=节奏更快、更需要精准控制和压力。",
pts:["没有袖子和衣领可抓——所有控制靠身体本身：underhook、head control、wrist、2-on-1","没有摩擦力——对手更滑、一切都更快","No-Gi的核心控制：脖子、手腕、腋下、髋部","Gi柔术转No-Gi时：放弃所有依赖grip的技术（蜘蛛、弓箭绞、DLR中的袖控）","No-Gi更强调：腿锁、front headlock、leg entanglement"],
chains:[
{type:"grip",name:"No-Gi核心Grip体系",steps:["Collar Tie颈箍：一手抓对手后颈——Gi衣领控制的No-Gi版本","Underhook：手从对手腋下穿过抱背——No-Gi最重要的控制","2-on-1：双手控制对手一只手臂——废掉对手50%战斗力","Wrist Control：单纯抓手腕——过渡性控制","Front Headlock：从前方抱头——Cary Jardine等摔跤手的武器","Body Lock：双手从对手背后抱身体——clinch位置"],tip:"No-Gi技术90%绕着这6个grip转",counter:null},
{type:"submission",name:"前三角绞 Front Triangle (D'Arce/Darce)",steps:["对手低头/龟缩时","一手从对手颈下穿过","绕到另一侧握住自己二头肌","另一手放在对手后脑","双手合拢形成三角状绞锁","身体向一侧倾斜施压"],tip:"No-Gi最常见的submission之一——龟位、断头台失败、pass中都能进入",counter:{name:"D'Arce逃脱",steps:["第一时间下巴内收","被绞侧肩膀向对手方向旋转","另一手推对手大腿保持距离","趁对手调整时抽出头部"]}},
{type:"submission",name:"Anaconda绞",steps:["和D'Arce镜像：从对手另一侧进入","一手从对手颈下穿过","绕到对手肩膀下方握自己手腕","向对手身体滚动翻转","利用gable grip+滚动完成绞杀"],tip:"D'Arce和Anaconda是No-Gi前三角的双生姐妹——从对手龟位出发",counter:{name:"Anaconda逃脱",steps:["下巴内收","向对手反方向滚动化解","尝试控制对手抓握的手"]}},
{type:"submission",name:"Guillotine断头台 (No-Gi High Elbow)",steps:["No-Gi断头台的核心是high elbow版本","前臂骨深入对手下巴下方","肘部指向天花板（不是向侧面）","另一手扣住前臂手腕","身体微微偏向attack侧","夹肘+髋部上提完成"],tip:"No-Gi断头台finish率极高——因为没有衣领保护颈部",counter:{name:"逃脱",steps:["下巴内收第一时间","被锁侧手臂越过对手身体抱腰","向被抱侧头部移动滑出","进入side control"]}},
{type:"sweep",name:"Butterfly Hook Sweep (No-Gi)",steps:["蝴蝶防守+双underhook","身体紧贴对手","向一侧倾倒","hook爆发上提","No-Gi版本需要更紧的控制——因为对手更滑"],tip:"No-Gi版本比Gi更依赖身体贴紧——Marcelo Garcia的No-Gi主打",counter:{name:"防御",steps:["被underhook时whizzer","重心后坐","断开身体贴紧"]}},
{type:"transition",name:"Arm Drag→Back Take (No-Gi核心)",steps:["抓对手手腕+同侧三头肌","爆发性将对手手臂拖过身体中线","身体跟着移动到对手侧面","绕到背后","建立body triangle或hooks"],tip:"No-Gi最可靠的back take路径——Marcelo Garcia的签名",counter:{name:"Arm Drag防御",steps:["手臂被拉时另一手立刻抓回","身体旋转面对对手","不要让对手绕到侧面"]}},
{type:"control",name:"Body Triangle身体三角",steps:["背控时用双腿形成三角锁住对手身体","一腿勾另一腿膝窝","body triangle>hooks——因为没有Gi时hooks容易被踢掉","锁住后可以腾出一只脚施压","几乎无法通过清除hooks逃脱"],tip:"No-Gi背控必学——比hooks稳10倍",counter:{name:"Body Triangle逃脱",steps:["不可能直接清除——只能向锁腿方向滑落","双手抓住顶上的腿向下拉","配合身体滑落减轻压力"]}},
{type:"submission",name:"Kimura Trap System",steps:["任何位置抓到kimura grip都可以控制","从bottom：北极星kimura trap","从top：sit-through kimura","kimura grip不只是finish——是过渡到其他位置的桥梁","Danaher体系中kimura是最通用的控制手段"],tip:"No-Gi最强的单一grip就是kimura grip——能finish能控制能过渡",counter:{name:"Kimura防御",steps:["手臂贴紧身体不给角度","抓住自己另一手或裤腿锚定","向对手方向翻身减压"]}},
{type:"transition",name:"Gi→No-Gi的思维转换",steps:["放弃：所有依赖衣领/袖口的技术","调整：抓握改为body控制（underhook/head/wrist）","加强：腿锁、front headlock、kimura trap","节奏：更快——不能慢慢'磨'","Pass Guard：Speed pass（toreando/leg drag）更适合No-Gi","下位：grip fighting变成hand fighting（手对手博弈）"],tip:"如果你从Gi转No-Gi——预留3-6个月适应期，不要一开始就自我怀疑",counter:null},
]},

// ──── PASSING SYSTEM ────
passingSystem:{name:"Pass Guard体系",en:"Guard Passing",role:"top",emoji:"🚪",
desc:"从对手的guard到达侧控/mount的技术。作为上位选手，passing能力是你Game Plan的起点——pass不掉就没有后续。",
pts:["Pass的两大流派：Pressure Pass（压力pass）和Speed Pass（速度pass）","Pressure：体重前压+慢慢磨过→适合大体型、Gi","Speed：快速绕过对手腿→适合灵活型、No-Gi","Gi上位推荐先练好Pressure Pass——更可靠更不依赖体能","Pass之前先要break对手的grip——不断grip就pass不了"],
chains:[
{type:"transition",name:"Knee Cut Pass膝切",steps:["一膝盖切入对手双腿之间","体重通过膝盖向下压","同时crossface控制对手头","膝盖切过对手大腿到达另一侧","建立侧控"],tip:"最基础最高效的pass——练好这一个就能应对80%的guard",counter:{name:"Knee Cut防御",steps:["被切膝盖侧立刻建立knee shield","手控制对手切入的膝盖","Shrimp制造空间恢复guard","或者DLR hook勾住前腿"]}},
{type:"transition",name:"Over-Under Pass上下压",steps:["一手从对手一条腿上方穿过（over）","另一手从另一条腿下方穿过（under）","双手合握形成锁扣","肩膀压住对手腹部","慢慢向一侧滑动完成pass"],tip:"经典pressure pass——Bernardo Faria的标志性技术。对手越挣扎你越压得紧",counter:{name:"防御",steps:["双手立刻frame推对手肩膀","被under的腿尝试抽出","shrimp制造空间建立half guard"]}},
{type:"transition",name:"Toreando Pass斗牛pass",steps:["双手抓住对手双腿裤脚/脚踝","将对手双腿推向一侧","身体快速绕到另一侧","建立侧控"],tip:"Speed pass的代表——需要速度和时机但不需要太多体力",counter:{name:"防御",steps:["双腿被推时髋部跟着转","膝盖保持面向对手","手抓住对手袖口重建grip"]}},
{type:"transition",name:"Leg Drag腿拖",steps:["控制对手一条腿","将该腿拖到你身体另一侧","用髋部压住被拖的腿","从侧面建立控制→pass到侧控"],tip:"现代竞技BJJ最流行的pass方式之一。DLR和berimbolo的反制",counter:{name:"防御",steps:["被拖腿立刻收回","髋部面向对手","建立knee shield"]}},
{type:"transition",name:"Stack Pass堆叠pass",steps:["抓住对手双腿向其头部方向推","将对手折叠起来（堆叠）","对手guard的所有张力被消除","从侧面绕过→建立侧控"],tip:"破解所有open guard的通用策略——对手被折叠后什么guard都没用",counter:{name:"防御",steps:["双手frame推对手肩膀不让其压过来","髋部向一侧转不让被完全堆叠","脚踩对手髋部制造距离"]}},
{type:"transition",name:"圣保罗Pass São Paulo Pass",steps:["从对手open guard内侧","一手抓对手一侧裤腿","肩膀压对手小腿向其髋部方向","同时头和上体低过对手腿","绕过到另一侧","建立侧控——重点是头的位置要低"],tip:"源自巴西圣保罗训练馆的pass方式——对身体柔韧性要求较高。Rafa Mendes常用",counter:{name:"圣保罗Pass防御",steps:["被压腿尝试抬起","手推对手肩膀保持距离","身体转向对手维持面朝对手"]}},
{type:"transition",name:"长步Pass Long Step",steps:["从低位pass对手open guard时","一腿从外侧大步后撤","绕过对手一侧防御","身体向绕过方向旋转","建立crossface和underhook完成侧控"],tip:"应对DLR和open guard的经典技术——距离拉开=hook失效",counter:null},
{type:"transition",name:"Smash Pass / Folding Pass",steps:["对手双腿都向一侧推","压住对手双腿在一起","肩膀压对手大腿","身体绕过到侧面","建立压力型侧控"],tip:"最'粗暴'的pressure pass——简单直接但对体力有要求",counter:null},
{type:"transition",name:"Headquarters / HQ Pass",steps:["Headquarters是所有现代pass的起始位","脚踩对手一侧大腿控制","手控制对手另一侧脚","从HQ→可以转knee cut/leg drag/long step等多种pass","现代竞技pass的'中枢位置'"],tip:"HQ不是一个pass——是pass的工厂。建立HQ后根据对手反应选择具体pass",counter:{name:"防御",steps:["感觉被踩腿时立刻将该腿收回","建立DLR hook控制对手踩的腿","或者立刻sit up建立close guard"]}},
]},

// ──── DRILL LIBRARY ────
drillLibrary:{name:"Drill训练清单",en:"Drill Library",role:"system",emoji:"🏋️",
desc:"Drill是把技术变成本能反应的唯一方法。每次训练前花10-15分钟做drill，比多打一轮对练进步更快。",
pts:["Solo drill（独自练习）：不需要搭档，热身时做","Partner drill（搭档练习）：双人配合，技术课后做","Positional sparring（位置对练）：从特定位置开始的限制性对练","每个drill重复至少20次才有效果——5次只是'见过'不是'会了'","Drill时速度慢→正确→逐渐加速→最终全速无意识完成"],
chains:[
{type:"control",name:"Solo Drill：虾行 Shrimp",steps:["躺在地面，双脚踩地","bridge髋部上提","髋部向一侧shrimp（像虾一样弹）","交替左右做到垫子另一头","回来时反向做"],tip:"BJJ最重要的solo drill——没有之一。每次热身做2-3趟",counter:null},
{type:"control",name:"Solo Drill：技术站立",steps:["从坐姿开始","一手撑地，对侧脚前踏","站起同时保持防御姿态","蹲回去→换边重复"],tip:"自卫和比赛都用得到——从地面安全站起来",counter:null},
{type:"control",name:"Solo Drill：Guard Retention髋部灵活",steps:["躺在地面，双脚朝上","想象对手从不同方向pass","髋部快速转向追踪'对手'","脚始终面向'对手'方向","左右交替做30秒"],tip:"Guard retention的基础——髋部追踪速度决定你能不能守住guard",counter:null},
{type:"control",name:"Solo Drill：Granby Roll前滚翻",steps:["从龟缩位置开始","一侧肩膀着地","沿肩→上背→另一侧肩滚动","滚完面朝上→恢复guard姿态","换边重复"],tip:"龟缩逃脱和guard recovery的关键动作",counter:null},
{type:"control",name:"Partner Drill：Pass→恢复循环",steps:["A从closed guard开始，B尝试pass","B pass成功→到侧控停2秒","A做侧控逃脱→恢复guard","B再次尝试pass→循环","做3分钟换人"],tip:"最有价值的partner drill——同时练passing和guard recovery",counter:null},
{type:"control",name:"Partner Drill：侧控→Mount过渡",steps:["A在侧控top位","A尝试过渡到mount","B轻度抵抗（50%力度）","A成功到mount→停2秒→回到侧控重做","做3分钟换人"],tip:"专门针对你的Game Plan——侧控到mount是你的核心路线",counter:null},
{type:"control",name:"Partner Drill：Mount Attack循环",steps:["A在mount位","B做各种防御（护颈/推/bridge）","A根据B的防御选择对应攻击","Cross choke→被防→转armbar→被防→转back take","做3分钟换人"],tip:"训练mount的if/then决策——对手的防御=你的进攻信号",counter:null},
{type:"control",name:"Positional Sparring建议",steps:["周一：从侧控开始——A attack/transition，B escape","周二：从mount开始——A attack，B escape","周三：从closed guard开始——A sweep/submit，B pass","周四：从背控开始——A choke，B escape","每轮3分钟，成功后reset从头开始"],tip:"Positional sparring比自由对练学得快——因为你在特定位置的重复次数是自由对练的10倍",counter:null},
]},

//  RENDER ENGINE

const $=id=>document.getElementById(id);
const app=$('app');
let state={view:'home',posKey:null,chainIdx:null,filter:'all',search:'',tab:'browse',chainEntry:null};

// ══════ STORAGE SYSTEM ══════
const STORAGE_KEY='bjj_arsenal_v2';
const store={
  load(){
    try{
      const raw=localStorage.getItem(STORAGE_KEY);
      return raw?JSON.parse(raw):{favorites:[],notes:{},log:[],viewed:{}};
    }catch(e){return{favorites:[],notes:{},log:[],viewed:{}}}
  },
  save(data){
    try{localStorage.setItem(STORAGE_KEY,JSON.stringify(data))}catch(e){}
  }
};
let userData=store.load();

// Helper: techniques are identified by "posKey:chainIdx"
function techId(posKey,chainIdx){return `${posKey}:${chainIdx}`}

function isFav(posKey,chainIdx){return userData.favorites.includes(techId(posKey,chainIdx))}
function toggleFav(posKey,chainIdx){
  const id=techId(posKey,chainIdx);
  const i=userData.favorites.indexOf(id);
  if(i>=0)userData.favorites.splice(i,1);
  else userData.favorites.push(id);
  store.save(userData);
}
function getNote(posKey,chainIdx){return userData.notes[techId(posKey,chainIdx)]||''}
function saveNote(posKey,chainIdx,text){
  const id=techId(posKey,chainIdx);
  if(text&&text.trim())userData.notes[id]=text.trim();
  else delete userData.notes[id];
  store.save(userData);
}
function markViewed(posKey,chainIdx){
  const id=techId(posKey,chainIdx);
  userData.viewed[id]=(userData.viewed[id]||0)+1;
  store.save(userData);
}
function getViewCount(posKey,chainIdx){return userData.viewed[techId(posKey,chainIdx)]||0}
function addLogEntry(text){
  userData.log.unshift({date:new Date().toISOString(),text});
  if(userData.log.length>100)userData.log.pop();
  store.save(userData);
}
function removeLogEntry(idx){
  userData.log.splice(idx,1);
  store.save(userData);
}

// ══════ DAILY PICK ══════
function dailyPicks(){
  const allTechs=[];
  Object.entries(DATA).forEach(([k,pos])=>{
    pos.chains.forEach((c,i)=>allTechs.push({posKey:k,chainIdx:i,chain:c,pos}));
  });
  // Seed by date so same day = same picks
  const d=new Date();
  const seed=d.getFullYear()*10000+(d.getMonth()+1)*100+d.getDate();
  let rng=seed;
  const rand=()=>{rng=(rng*9301+49297)%233280;return rng/233280};
  // Fisher-Yates shuffle with seeded RNG, pick 5
  const arr=[...allTechs];
  for(let i=arr.length-1;i>0;i--){
    const j=Math.floor(rand()*(i+1));
    [arr[i],arr[j]]=[arr[j],arr[i]];
  }
  return arr.slice(0,5);
}

function tag(label,color){return `<span class="tag" style="background:${color}20;color:${color}">${label}</span>`}
function roleTag(role){const r=ROLE[role];return tag(r.label,r.color)}
function typeTag(type){const t=TYPE[type];return tag(t.label,t.color)}

function stepTimeline(steps,color){
  return steps.map((s,i)=>`
    <div class="step">
      <div class="step-dot-col">
        <div class="step-dot" style="background:${color}18;border:1.5px solid ${color}70;color:${color}">${String(i+1).padStart(2,'0')}</div>
        ${i<steps.length-1?`<div class="step-line" style="background:${color}50"></div>`:''}
      </div>
      <div class="step-text">${typeof s==='string'?s:`<div class="step-title">${s.step}</div><div class="step-detail">${s.detail}</div>`}</div>
    </div>
  `).join('');
}

function counterBox(counter){
  if(!counter)return '';
  return `
    <div class="counter-box fade-up" style="animation-delay:.18s">
      <div class="counter-title"><span>↗</span>逃脱反制 · ${counter.name}</div>
      ${stepTimeline(counter.steps,'#7a9b5c')}
    </div>
  `;
}

function renderHome(){
  const tabContent={
    browse:renderBrowseTab,
    daily:renderDailyTab,
    favorites:renderFavoritesTab,
    log:renderLogTab,
  };

  app.innerHTML=`
    <div class="header fade-up">
      <div class="kanji">柔 術</div>
      <h1>BJJ Arsenal</h1>
      <div class="zh-title">巴柔武器库</div>
      <div class="sub">Pre-Training Reference</div>
    </div>

    <div class="tab-bar fade-up" style="animation-delay:.04s">
      <button class="tab-btn ${state.tab==='browse'?'active':''}" data-tab="browse">
        <span class="tab-icon">☰</span><span>浏览</span>
      </button>
      <button class="tab-btn ${state.tab==='daily'?'active':''}" data-tab="daily">
        <span class="tab-icon">◈</span><span>每日</span>
      </button>
      <button class="tab-btn ${state.tab==='favorites'?'active':''}" data-tab="favorites">
        <span class="tab-icon">★</span><span>收藏${userData.favorites.length?`<span class="count-badge">${userData.favorites.length}</span>`:''}</span>
      </button>
      <button class="tab-btn ${state.tab==='log'?'active':''}" data-tab="log">
        <span class="tab-icon">◷</span><span>日志${userData.log.length?`<span class="count-badge">${userData.log.length}</span>`:''}</span>
      </button>
    </div>

    <div id="tabContent" class="fade-in">
      ${(tabContent[state.tab]||renderBrowseTab)()}
    </div>

    <div class="footer">
      <div class="kanji-mark">道 精 進</div>
      ${Object.keys(DATA).length} 位置体系 · ${Object.values(DATA).reduce((a,v)=>a+v.chains.length,0)} 个技术<br>
      Game Plan · Drill · Leg Lock · Berimbolo · No-Gi
    </div>
  `;

  // Tab switching
  document.querySelectorAll('[data-tab]').forEach(b=>b.addEventListener('click',()=>{
    state.tab=b.dataset.tab;renderHome();
  }));

  // Attach tab-specific handlers
  attachTabHandlers();
}

function attachTabHandlers(){
  // Browse tab
  const si=$('searchInput');
  if(si)si.addEventListener('input',e=>{state.search=e.target.value;const tc=$('tabContent');if(tc)tc.innerHTML=renderBrowseTab();attachTabHandlers()});
  document.querySelectorAll('[data-filter]').forEach(b=>b.addEventListener('click',()=>{state.filter=b.dataset.filter;const tc=$('tabContent');if(tc)tc.innerHTML=renderBrowseTab();attachTabHandlers()}));
  document.querySelectorAll('[data-pos]').forEach(b=>b.addEventListener('click',()=>{state.posKey=b.dataset.pos;state.chainIdx=null;renderPosition();window.scrollTo(0,0)}));
  // Daily / Fav cards - direct technique navigation
  document.querySelectorAll('[data-tech]').forEach(b=>b.addEventListener('click',()=>{
    const[p,i]=b.dataset.tech.split(':');
    state.posKey=p;state.chainIdx=parseInt(i);
    state.chainEntry='home'; // Mark that we came from home tab
    renderChain();window.scrollTo(0,0);
  }));
  // Log handlers
  const lf=$('logInput'),ls=$('logSubmit');
  if(lf&&ls){
    ls.addEventListener('click',()=>{
      if(lf.value.trim()){
        addLogEntry(lf.value.trim());
        lf.value='';
        const tc=$('tabContent');if(tc)tc.innerHTML=renderLogTab();
        attachTabHandlers();
      }
    });
    lf.addEventListener('keydown',e=>{
      if(e.key==='Enter'&&(e.metaKey||e.ctrlKey))ls.click();
    });
  }
  document.querySelectorAll('[data-log-del]').forEach(b=>b.addEventListener('click',e=>{
    e.stopPropagation();
    removeLogEntry(parseInt(b.dataset.logDel));
    const tc=$('tabContent');if(tc)tc.innerHTML=renderLogTab();
    attachTabHandlers();
  }));
}

function renderBrowseTab(){
  const positions=Object.entries(DATA);
  const s=state.search.toLowerCase();
  const filtered=positions.filter(([,v])=>{
    const roleMatch=state.filter==='all'||v.role===state.filter;
    if(!s)return roleMatch;
    const nm=v.name.includes(s)||v.en.toLowerCase().includes(s);
    const cm=v.chains.some(c=>c.name.toLowerCase().includes(s)||c.name.includes(s));
    return roleMatch&&(nm||cm);
  });
  const totalChains=filtered.reduce((a,[,v])=>a+v.chains.length,0);

  return `
    <div class="search-wrap">
      <span class="search-icon">⌕</span>
      <input class="search-bar" id="searchInput" type="text" placeholder="搜索技术  armbar · DLR · 弓箭绞 · 腿锁…" value="${state.search}">
    </div>

    <div class="filters">
      ${['all','guard','top','bottom','system'].map(k=>{
        const labels={all:'全部',guard:'防守',top:'上位',bottom:'下位',system:'体系/训练'};
        return `<button class="filter-btn ${state.filter===k?'active':''}" data-filter="${k}">${labels[k]}</button>`;
      }).join('')}
    </div>

    <div class="stats">
      <span>${filtered.length} 位置</span>
      <span class="dot"></span>
      <span>${totalChains} 技术</span>
    </div>

    <div>
      ${filtered.map(([key,pos],idx)=>{
        const counts={};
        pos.chains.forEach(c=>{counts[c.type]=(counts[c.type]||0)+1});
        const meta=Object.entries(counts).map(([t,n])=>`<span style="color:${TYPE[t].color}">${TYPE[t].icon} ${n}</span>`).join('');
        // Count viewed and favorited techniques in this position
        let viewed=0,fav=0;
        pos.chains.forEach((_,ci)=>{
          if(getViewCount(key,ci)>0)viewed++;
          if(isFav(key,ci))fav++;
        });
        const progressBadge=viewed>0?`<span style="color:var(--gold);opacity:0.7">◉ ${viewed}/${pos.chains.length}</span>`:'';
        const favBadge=fav>0?`<span style="color:var(--gold)">★ ${fav}</span>`:'';
        return `
          <button class="pos-card fade-up" data-pos="${key}" style="animation-delay:${Math.min(idx*0.025,0.4)}s">
            <div class="emoji">${pos.emoji}</div>
            <div class="info">
              <div class="name-row">
                <span class="name">${pos.name}</span>
                ${roleTag(pos.role)}
              </div>
              <div class="name-en">${pos.en}</div>
              <div class="meta">${meta}${progressBadge?` <span style="color:var(--text-deep)">·</span> ${progressBadge}`:''}${favBadge?` <span style="color:var(--text-deep)">·</span> ${favBadge}`:''}</div>
            </div>
            <div class="arrow">›</div>
          </button>
        `;
      }).join('')}
      ${filtered.length===0?'<div class="empty"><div class="icon">⌕</div><div class="text">未找到匹配的位置或技术</div></div>':''}
    </div>
  `;
}

function renderDailyTab(){
  const picks=dailyPicks();
  const d=new Date();
  const dateStr=`${d.getMonth()+1}月${d.getDate()}日 · ${['日','一','二','三','四','五','六'][d.getDay()]}`;
  const totalViewed=Object.keys(userData.viewed).length;
  const totalTech=Object.values(DATA).reduce((a,v)=>a+v.chains.length,0);

  return `
    <div class="progress-summary fade-up">
      <div class="progress-stat">
        <div class="num">${totalViewed}</div>
        <div class="label">已学技术</div>
      </div>
      <div class="progress-stat">
        <div class="num">${userData.favorites.length}</div>
        <div class="label">收藏</div>
      </div>
      <div class="progress-stat">
        <div class="num">${Math.round(totalViewed/totalTech*100)}%</div>
        <div class="label">覆盖率</div>
      </div>
    </div>

    <div class="daily-card fade-up" style="animation-delay:.05s">
      <div class="daily-header">
        <div class="daily-title">今日推荐</div>
        <div class="daily-date">${dateStr}</div>
      </div>
      <div class="daily-subtitle">每天随机选5个技术复习 · 明天再来会是新的</div>
      <div class="daily-tech-list">
        ${picks.map((p,i)=>`
          <button class="daily-tech" data-tech="${p.posKey}:${p.chainIdx}">
            <div class="num">${i+1}</div>
            <div class="info">
              <div class="name">${TYPE[p.chain.type].icon} ${p.chain.name}</div>
              <div class="pos">${p.pos.emoji} ${p.pos.name}</div>
            </div>
            ${isFav(p.posKey,p.chainIdx)?'<span style="color:var(--gold)">★</span>':''}
            <span style="color:var(--text-deep)">›</span>
          </button>
        `).join('')}
      </div>
    </div>
  `;
}

function renderFavoritesTab(){
  if(!userData.favorites.length){
    return `
      <div class="empty-tab fade-up">
        <div class="big-icon">☆</div>
        <div class="title">还没有收藏的技术</div>
        <div class="hint">在技术详情页点击右上角的 ☆ 按钮来收藏<br>方便以后快速复习</div>
      </div>
    `;
  }
  const favs=userData.favorites.map(id=>{
    const[posKey,chainIdxStr]=id.split(':');
    const chainIdx=parseInt(chainIdxStr);
    const pos=DATA[posKey];
    if(!pos)return null;
    const chain=pos.chains[chainIdx];
    if(!chain)return null;
    return{posKey,chainIdx,chain,pos};
  }).filter(Boolean);

  // Group by type
  const byType={};
  favs.forEach(f=>{
    if(!byType[f.chain.type])byType[f.chain.type]=[];
    byType[f.chain.type].push(f);
  });

  return `
    <div style="font-size:12px;color:var(--text-muted);margin-bottom:16px;text-align:center;letter-spacing:1px;font-family:var(--font-serif);font-style:italic">
      ${favs.length} 个收藏技术
    </div>
    ${['submission','sweep','escape','transition','control','grip'].map(type=>{
      if(!byType[type])return '';
      const tc=TYPE[type];
      return `
        <div class="cat-header" style="color:${tc.color}">
          <span style="font-size:14px">${tc.icon}</span>
          <span>${tc.label}</span>
          <span style="opacity:0.5;font-weight:400">· ${byType[type].length}</span>
        </div>
        ${byType[type].map(f=>`
          <button class="chain-card" data-tech="${f.posKey}:${f.chainIdx}" style="border-color:${tc.color}22;background:${tc.color}06">
            <div style="flex:1">
              <div class="chain-name">${f.chain.name}</div>
              <div class="chain-meta">${f.pos.emoji} ${f.pos.name} · ${f.chain.steps.length} 步</div>
            </div>
            <span class="chain-fav active">★</span>
            <span style="color:${tc.color};opacity:0.6;font-size:16px;font-family:var(--font-serif)">›</span>
          </button>
        `).join('')}
      `;
    }).join('')}
  `;
}

function renderLogTab(){
  return `
    <div class="log-form fade-up">
      <div style="font-size:11px;color:var(--gold);margin-bottom:10px;letter-spacing:2px;text-transform:uppercase;font-weight:700">◷ 新训练笔记</div>
      <textarea class="log-input" id="logInput" placeholder="今天练了什么？有什么新感受？&#10;比如：今天课上练了DLR→berimbolo，对手重心前倾时扫很容易，但如果他后坐就没反应..."></textarea>
      <button class="log-submit" id="logSubmit">保存笔记 · Save Entry</button>
    </div>

    ${userData.log.length===0?`
      <div class="empty-tab fade-up" style="animation-delay:.05s">
        <div class="big-icon">◷</div>
        <div class="title">训练日志为空</div>
        <div class="hint">训练后简短记录一下当天的收获<br>帮助你追踪进步和发现规律</div>
      </div>
    `:userData.log.map((entry,i)=>{
      const d=new Date(entry.date);
      const dateStr=`${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
      return `
        <div class="log-item fade-up" style="animation-delay:${Math.min(i*0.02,0.3)}s">
          <button class="log-delete" data-log-del="${i}">删除</button>
          <div class="log-date">${dateStr}</div>
          <div class="log-text">${entry.text.replace(/</g,'&lt;').replace(/>/g,'&gt;')}</div>
        </div>
      `;
    }).join('')}
  `;
}

function renderPosition(){
  const pos=DATA[state.posKey];
  const typeOrder=['submission','sweep','escape','transition','control','grip'];

  app.innerHTML=`
    <button class="back-btn" id="backHome">← 全部位置</button>

    <div class="hero-card fade-up">
      <div class="hero-title-row">
        <span class="hero-emoji">${pos.emoji}</span>
        <div style="flex:1;min-width:0">
          <div class="hero-name">${pos.name}</div>
          <div class="hero-name-en">${pos.en}</div>
        </div>
        ${roleTag(pos.role)}
      </div>
      <p class="hero-desc">${pos.desc}</p>
    </div>

    <div class="key-points-card fade-up" style="animation-delay:.06s">
      <div class="section-title first">位置要点 · Key Points</div>
      ${pos.pts.map((p,i)=>`<div class="key-point"><span class="num">${String(i+1).padStart(2,'0')}</span><span class="text">${p}</span></div>`).join('')}
    </div>

    <div class="section-title">技术链 · Techniques</div>
    ${typeOrder.map(type=>{
      const chains=pos.chains.map((c,i)=>({...c,idx:i})).filter(c=>c.type===type);
      if(!chains.length)return '';
      const tc=TYPE[type];
      return `
        <div class="cat-header" style="color:${tc.color}">
          <span style="font-size:14px">${tc.icon}</span>
          <span>${tc.label}</span>
          <span style="opacity:0.5;font-weight:400">· ${chains.length}</span>
        </div>
        ${chains.map((chain,ci)=>{
          const fav=isFav(state.posKey,chain.idx);
          const views=getViewCount(state.posKey,chain.idx);
          return `
          <button class="chain-card fade-up" data-chain="${chain.idx}" style="border-color:${tc.color}22;background:${tc.color}06;animation-delay:${ci*0.03}s">
            <div style="flex:1">
              <div class="chain-name">${chain.name}</div>
              <div class="chain-meta">${chain.steps.length} 步${chain.counter?' · 含逃脱':''}${views>0?` · 复习 ${views} 次`:''}</div>
            </div>
            <span class="chain-fav ${fav?'active':''}">${fav?'★':'☆'}</span>
            <span style="color:${tc.color};opacity:0.6;font-size:16px;font-family:var(--font-serif)">›</span>
          </button>
        `;}).join('')}
      `;
    }).join('')}
  `;

  $('backHome').addEventListener('click',()=>{state.posKey=null;renderHome();window.scrollTo(0,0)});
  document.querySelectorAll('[data-chain]').forEach(b=>b.addEventListener('click',()=>{state.chainIdx=parseInt(b.dataset.chain);renderChain();window.scrollTo(0,0)}));
}

function renderChain(){
  const pos=DATA[state.posKey];
  const chain=pos.chains[state.chainIdx];
  const tc=TYPE[chain.type];

  // Track that this was viewed
  markViewed(state.posKey,state.chainIdx);

  const related=pos.chains.map((c,i)=>({...c,idx:i})).filter(c=>c.idx!==state.chainIdx);
  const fav=isFav(state.posKey,state.chainIdx);
  const currentNote=getNote(state.posKey,state.chainIdx);
  const views=getViewCount(state.posKey,state.chainIdx);

  app.innerHTML=`
    <button class="back-btn" id="backPos">← ${state.chainEntry==='home'?'返回主页':pos.name}</button>

    <div class="hero-card fade-up">
      <div class="chain-hero">
        <div class="chain-icon" style="background:${tc.color}15;border-color:${tc.color}35;color:${tc.color}">${tc.icon}</div>
        <div style="flex:1;min-width:0">
          <div class="chain-title">${chain.name}</div>
          <div class="chain-meta-row">
            ${typeTag(chain.type)}
            <span class="chain-from">from ${pos.name}</span>
            ${views>1?`<span class="view-badge">${views}×</span>`:''}
          </div>
        </div>
        <button class="fav-btn ${fav?'active':''}" id="favBtn" aria-label="收藏">${fav?'★':'☆'}</button>
      </div>
    </div>

    <div class="section-title first">动作步骤 · Sequence</div>
    <div class="steps-wrap fade-up" style="animation-delay:.05s">
      ${stepTimeline(chain.steps,tc.color)}
    </div>

    <div class="tip-box fade-up" style="animation-delay:.1s">
      <div class="tip-label">◆ 要点</div>
      <div class="tip-text">${chain.tip}</div>
    </div>

    ${counterBox(chain.counter)}

    <div class="note-section fade-up" style="animation-delay:.18s">
      <div class="note-label">
        <span>✎ 我的笔记 · My Notes</span>
        <span class="note-action" id="noteHint">自动保存</span>
      </div>
      <textarea class="note-textarea" id="noteInput" placeholder="写下你的体会、对某类对手有效的时机、常犯的错误...">${currentNote.replace(/</g,'&lt;').replace(/>/g,'&gt;')}</textarea>
      <div class="note-status" id="noteStatus">${currentNote?'已保存':''}</div>
    </div>

    <div class="video-section fade-up" style="animation-delay:.22s">
      <div class="video-label">▷ 教学视频</div>
      <div class="video-row">
        <a href="https://www.youtube.com/results?search_query=${encodeURIComponent('BJJ '+chain.name.replace(/[（）()]/g,' ').trim())}" target="_blank" rel="noopener" class="video-btn yt">
          <span>▶</span> YouTube
        </a>
        <a href="https://www.bilibili.com/search?keyword=${encodeURIComponent('巴西柔术 '+chain.name.split(' ')[0])}" target="_blank" rel="noopener" class="video-btn bili">
          <span>◉</span> 哔哩哔哩
        </a>
      </div>
    </div>

    ${related.length?`
    <div class="related-section fade-up" style="animation-delay:.26s">
      <div class="related-label">同位置其他技术</div>
      <div class="nav-chips">
        ${related.map(c=>{
          const isFavRel=isFav(state.posKey,c.idx);
          return `
          <button class="nav-chip" data-chain="${c.idx}" style="border-color:${TYPE[c.type].color}35;background:${TYPE[c.type].color}10;color:${TYPE[c.type].color}">
            <span>${TYPE[c.type].icon}</span>${c.name.length>14?c.name.substring(0,14)+'…':c.name}${isFavRel?'<span style="color:var(--gold);margin-left:2px">★</span>':''}
          </button>
        `;}).join('')}
      </div>
    </div>
    `:''}
  `;

  $('backPos').addEventListener('click',()=>{
    if(state.chainEntry==='home'){
      state.chainEntry=null;state.posKey=null;state.chainIdx=null;
      renderHome();
    }else{
      state.chainIdx=null;renderPosition();
    }
    window.scrollTo(0,0);
  });
  document.querySelectorAll('[data-chain]').forEach(b=>b.addEventListener('click',()=>{state.chainIdx=parseInt(b.dataset.chain);state.chainEntry=null;renderChain();window.scrollTo(0,0)}));

  // Favorite button with animation
  $('favBtn').addEventListener('click',()=>{
    toggleFav(state.posKey,state.chainIdx);
    const btn=$('favBtn');
    const nowFav=isFav(state.posKey,state.chainIdx);
    btn.classList.toggle('active',nowFav);
    btn.textContent=nowFav?'★':'☆';
    // Haptic feedback if supported
    if(navigator.vibrate)navigator.vibrate(nowFav?[10,30,10]:10);
  });

  // Note auto-save
  const ni=$('noteInput');
  const ns=$('noteStatus');
  let saveTimer;
  ni.addEventListener('input',()=>{
    clearTimeout(saveTimer);
    ns.textContent='输入中…';
    saveTimer=setTimeout(()=>{
      saveNote(state.posKey,state.chainIdx,ni.value);
      ns.textContent='已保存 ✓';
      setTimeout(()=>{if(ns.textContent==='已保存 ✓')ns.textContent=ni.value.trim()?'已保存':''},1500);
    },600);
  });
}

// Init
renderHome();
</script>
</body>
</html>
