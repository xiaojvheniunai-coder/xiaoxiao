<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>巴柔武器库 · BJJ Arsenal</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🥋</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --gold:#d4a853;--gold-dim:rgba(212,168,83,0.12);--gold-bright:#f0e6d3;
  --bg1:#0a0a0f;--bg2:#111827;--bg3:#0f172a;
  --card:rgba(255,255,255,0.025);--card-border:#1e293b;
  --text:#e2e8f0;--text-dim:#94a3b8;--text-muted:#64748b;--text-dark:#475569;
  --red:#ef4444;--blue:#3b82f6;--green:#22c55e;--purple:#a855f7;--orange:#f97316;--cyan:#06b6d4;
  --font:'Noto Sans SC','PingFang SC','Hiragino Sans GB',-apple-system,sans-serif;
}
body{font-family:var(--font);background:linear-gradient(160deg,var(--bg1) 0%,var(--bg2) 40%,var(--bg3) 100%);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased}
button{font-family:var(--font);cursor:pointer;-webkit-tap-highlight-color:transparent}
input{font-family:var(--font)}
.container{max-width:640px;margin:0 auto;padding:20px 16px;min-height:100vh}
.hide{display:none!important}

/* Animations */
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.fade-up{animation:fadeUp .35s ease-out both}
.fade-in{animation:fadeIn .25s ease-out both}

/* Header */
.header{text-align:center;margin-bottom:24px;padding-top:8px}
.header .icon{font-size:44px;margin-bottom:4px}
.header h1{font-size:26px;font-weight:900;background:linear-gradient(90deg,var(--gold-bright),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:3px}
.header .sub{font-size:12px;color:var(--text-muted);margin-top:6px;letter-spacing:1px}

/* Search */
.search-bar{width:100%;padding:12px 16px;border-radius:12px;border:1px solid var(--card-border);background:var(--card);color:var(--text);font-size:14px;outline:none;margin-bottom:14px}
.search-bar::placeholder{color:var(--text-dark)}
.search-bar:focus{border-color:var(--gold);box-shadow:0 0 0 2px rgba(212,168,83,.1)}

/* Tab bar */
.tabs{display:flex;gap:0;margin-bottom:16px;background:rgba(255,255,255,.03);border-radius:12px;padding:3px}
.tab-btn{flex:1;padding:9px 0;border-radius:10px;border:none;font-size:13px;font-weight:700;transition:all .2s;background:transparent;color:var(--text-dark)}
.tab-btn.active{background:rgba(212,168,83,.12);color:var(--gold)}

/* Filter pills */
.filters{display:flex;gap:6px;margin-bottom:16px;justify-content:center;flex-wrap:wrap}
.filter-btn{padding:6px 14px;border-radius:16px;border:1.5px solid var(--card-border);background:rgba(255,255,255,.02);color:var(--text-dark);font-size:12px;font-weight:600;transition:all .2s}
.filter-btn.active{border-color:var(--gold);background:var(--gold-dim);color:var(--gold)}

/* Cards */
.pos-card{display:flex;align-items:center;gap:14px;padding:14px 16px;border-radius:14px;border:1px solid var(--card-border);background:var(--card);text-align:left;color:var(--text);width:100%;transition:all .15s;margin-bottom:6px}
.pos-card:active{transform:scale(.985);background:rgba(255,255,255,.04)}
.pos-card .emoji{font-size:28px;flex-shrink:0;width:40px;text-align:center}
.pos-card .info{flex:1;min-width:0}
.pos-card .name{font-size:15px;font-weight:700}
.pos-card .name-en{font-size:11px;color:var(--text-dark);margin-top:1px}
.pos-card .meta{font-size:10px;color:var(--text-muted);margin-top:3px;display:flex;gap:8px;flex-wrap:wrap}
.pos-card .arrow{font-size:16px;color:#334155;flex-shrink:0}

/* Tags */
.tag{font-size:10px;padding:1px 8px;border-radius:8px;font-weight:600;display:inline-block;white-space:nowrap}

/* Chain cards */
.chain-card{display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:12px;text-align:left;color:var(--text);width:100%;transition:all .15s;margin-bottom:5px}
.chain-card:active{transform:scale(.985)}
.chain-card .chain-name{font-size:14px;font-weight:600}
.chain-card .chain-meta{font-size:11px;color:var(--text-dark);margin-top:2px}

/* Detail page */
.back-btn{background:none;border:none;color:var(--gold);font-size:14px;padding:4px 0;margin-bottom:16px;font-weight:600}
.detail-card{padding:20px;border-radius:16px;background:var(--card);border:1px solid var(--card-border);margin-bottom:18px}
.section-title{font-size:13px;font-weight:700;color:var(--gold);margin-bottom:14px;letter-spacing:1px}
.key-point{display:flex;gap:10px;font-size:13px;line-height:1.8;margin-bottom:8px}
.key-point .num{color:var(--gold);font-weight:700;flex-shrink:0;min-width:18px}
.key-point .text{color:var(--text-dim)}

/* Step timeline */
.step{display:flex;gap:14px}
.step-dot-col{display:flex;flex-direction:column;align-items:center;width:28px;flex-shrink:0}
.step-dot{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;flex-shrink:0}
.step-line{width:2px;flex:1;min-height:14px}
.step-text{padding:2px 0 16px;font-size:14px;line-height:1.75;color:#cbd5e1}
.step-text .step-title{font-weight:700;margin-bottom:2px;color:var(--text)}
.step-text .step-detail{font-size:13px;color:var(--text-dim);line-height:1.7}

/* Tip box */
.tip-box{padding:14px 16px;border-radius:12px;background:rgba(212,168,83,.05);border:1px solid rgba(212,168,83,.15)}
.tip-box .tip-label{font-size:13px;font-weight:700;color:var(--gold);margin-bottom:4px}
.tip-box .tip-text{font-size:14px;line-height:1.9;color:var(--text-dim)}

/* Counter box */
.counter-box{padding:14px 16px;border-radius:12px;background:rgba(34,197,94,.04);border:1px solid rgba(34,197,94,.12);margin-top:14px}
.counter-title{font-size:13px;font-weight:700;color:var(--green);margin-bottom:10px}

/* Mistake box */
.mistake-item{display:flex;gap:8px;font-size:12px;line-height:1.7;margin-bottom:6px}
.mistake-x{color:var(--red);flex-shrink:0;font-weight:700}

/* Nav chips for related techniques */
.nav-chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:16px}
.nav-chip{padding:6px 12px;border-radius:8px;font-size:12px;font-weight:500;transition:all .15s}
.nav-chip:active{transform:scale(.95)}

/* Stats bar */
.stats{display:flex;justify-content:center;gap:16px;margin-bottom:16px;font-size:11px;color:var(--text-dark)}

/* Footer */
.footer{text-align:center;margin-top:32px;font-size:11px;color:#334155;line-height:1.8;padding-bottom:24px}

/* Category group header */
.cat-header{display:flex;align-items:center;gap:6px;font-size:11px;font-weight:700;margin-bottom:8px;margin-top:14px}

/* Scrollbar */
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#1e293b;border-radius:4px}
</style>
</head>

closedGuard:{name:"封闭式防守",en:"Closed Guard",role:"guard",emoji:"🦵",
desc:"双腿缠绕对手腰部，脚踝交叉锁紧。最基础也最安全的防守位置，进攻选项极其丰富。",
pts:["Break posture是一切前提——双手拉对手头/衣领向下","髋部保持活跃，微微偏向进攻侧——不要平躺","双腿夹紧脚踝锁死，不给对手站起空间","Grip有目的：一手控袖口/手腕，一手控衣领/后颈","对手站起时立刻打开guard转open guard，不要硬挂被slam"],
chains:[

{type:"submission",name:"三角绞 Triangle",steps:["控制一侧手腕推向对侧","同侧腿高挂颈部","另一腿锁到膝窝形成三角","拉头+cut angle夹紧完成"],tip:"锁完先调角度（身体偏转30度）再夹紧",counter:{name:"三角绞逃脱",steps:["立刻坐直，被困手肘插入对手大腿","另一手压对手锁腿脚踝","站起抬起对手后向下摔抽手"]}},
{type:"submission",name:"断头台 Guillotine",steps:["对手低头时前臂插入颈下","S-grip或palm-to-palm锁扣","闭合guard身体后仰","髋部上提弓背完成"],tip:"High elbow版本更强：肘部指向天花板",counter:{name:"断头台逃脱",steps:["下巴内收","被锁侧手绕过对手身体抱腰","头向被抱侧移动滑出","pass到side control"]}},
{type:"submission",name:"木村锁 Kimura",steps:["对手手撑地时抓住手腕","坐起贴近对手","攻击手从对手臂外穿过握自己手腕","figure-4锁→身体旋转施压"],tip:"坐起来是关键步骤。Kimura grip也可以用作sweep控制",counter:{name:"Kimura逃脱",steps:["被控手臂立刻贴紧身体","抓自己裤腿/Gi锚定","向对手方向翻身减压"]}},

{type:"sweep",name:"花扫 Flower Sweep",steps:["一手深控袖口钉住对手手臂","另一手深抓同侧裤腿","攻击侧脚踩地，摆锤腿大幅甩向天花板","摆锤动量+蹬地力+手配合翻转"],tip:"摆锤腿甩得越高力量越大。对大体型对手也有效",counter:{name:"花扫防御",steps:["被抓裤腿侧腿后撤","手post撑地维持平衡","重心降低"]}},

openGuard:{name:"开放式防守总论",en:"Open Guard Overview",role:"guard",emoji:"🌊",

{type:"sweep",name:"单蝶扫 One Hook Sweep",steps:["只用一侧hook","另一腿放对手腿外侧控制","拿underhook贴紧","hook侧倾倒+上提","外侧腿辅助控制防其base"],tip:"双hook进不去时的替代方案",counter:{name:"防御",steps:["被勾侧膝盖外张破坏hook角度","肘夹紧不给拉袖口","重心后调"]}},
{type:"submission",name:"断头台 Guillotine",steps:["对手低头时前臂绕颈","High elbow锁扣","身体后倒hooks上提","Guard锁紧施压"],tip:"蝴蝶的坐起姿态特别适合接guillotine——距离近、头在面前",counter:{name:"逃脱",steps:["下巴内收+肩膀顶入胸口","被锁侧手绕过身体抱腰","横向移动头部滑出"]}},
{type:"transition",name:"Arm Drag反背",steps:["一手抓手腕另一手抓三头肌","快速拽过身体中线","身体跟着移动绕到侧面/背后","建立seatbelt + hooks"],tip:"Arm drag要又快又猛——犹豫就失败",counter:{name:"防御",steps:["手臂被拉时另一手立刻抓回","身体旋转面向对手不露背"]}},
{type:"transition",name:"转入单腿 Single Leg",steps:["利用underhook身体偏移","空手抓对手一条腿","从坐起站起来","完成single leg"],tip:"蝴蝶和摔跤衔接非常自然",counter:null},
]},

chains:[

{type:"sweep",name:"Lasso扫",steps:["一脚从踩二头肌绕过手臂外侧缠绕上臂(lasso)","另一侧保持标准蜘蛛","lasso侧腿内拧限制手臂","双腿配合+手拉袖口翻向lasso侧"],tip:"Lasso缠绕要深——小腿完全绕过手臂",counter:{name:"防御",steps:["立刻用被lasso手肘向下抽出","重心后移不给对手拧力","另一手辅助剥离lasso"]}},
{type:"submission",name:"蜘蛛三角绞",steps:["一腿从踩二头肌高挂到对手颈部","制造一手进一手出条件","另一腿锁定三角","拉头调角度完成"],tip:"蜘蛛到三角是高频combo——你已控制双臂很容易制造条件",counter:{name:"逃脱",steps:["立刻坐直","被困肘插入对手大腿","站起+摔"]}},
{type:"submission",name:"Omoplata全臂锁",steps:["控制一侧袖口拉过中线","同侧腿穿过对手手臂上方","腿挂肩膀，身体旋转面朝地面","坐起前倾对肩关节施压"],tip:"旋转要快不给对手抽手机会",counter:{name:"逃脱",steps:["对手腿刚挂上时前滚翻化解","或向前走绕过头部","翻滚解除肩部锁定"]}},
{type:"transition",name:"转DLR",steps:["对手试图跨过你一条腿pass时","被跨腿转为DLR hook","手从袖口转抓裤腿/脚踝","进入DLR继续进攻"],tip:"Spider和DLR天然互转——高水平选手自如切换",counter:null},
]},

halfGuard:{name:"半防守",en:"Half Guard",role:"guard",emoji:"½",
desc:"双腿缠住对手一条腿。现代BJJ发展出knee shield、deep half、lockdown等丰富子系统。",
pts:["绝不平躺——侧身面对对手是生存基础","争取underhook——整个进攻体系的基石","被crossface压住→先用knee shield制造空间","下方腿主动缠紧不是被动等pass","随时准备转deep half或恢复full guard"],
chains:[
{type:"sweep",name:"老忠实扫 Old Faithful",steps:["Underhook深穿到腋下抓腰带/后背","头顶对手胸口","后腿勾住对手被缠腿","前脚踩地辅助","整体翻转到top"],tip:"Underhook要深+头位置正确+用整体力量翻",counter:{name:"防御",steps:["Whizzer压住underhook","Crossface控制头","用自由腿踩地维持底盘"]}},
{type:"transition",name:"Dog Fight→反背",steps:["拿到underhook后坐起进入dog fight","Underhook手爬到对手背后","身体下潜穿到对手侧面→背后","建立seatbelt+hooks"],tip:"Lucas Leite经典路线。不要在dog fight停留太久",counter:{name:"防御",steps:["Whizzer保持对手无法转身后","重心压低","对手开始绕后立刻坐下面向"]}},
{type:"sweep",name:"电梯扫 Elevator Sweep",steps:["外侧腿变成蝴蝶hook","上体贴紧拿住underhook","向underhook方向倾倒","hook上提翻转"],tip:"本质是在half guard里做蝴蝶扫",counter:{name:"防御",steps:["感觉hook插入时抽腿后撤","膝盖外顶破坏hook","Whizzer压紧+体重前倾"]}},
{type:"sweep",name:"Knee Shield进攻",steps:["建立knee shield抵住对手胸/肩","控制袖口+衣领","knee shield脚踩髋推开","可转arm drag→back take或butterfly hook→sweep"],tip:"Knee shield是half guard的安全模式——先稳定再决定路径",counter:null},
{type:"transition",name:"Deep Half入口",steps:["对手压力太大拿不到underhook时","身体潜到对手被缠腿下方","肩膀扛住大腿双手抱腿","进入deep half→多种扫技或back take"],tip:"Deep half是'被压了就往下钻'的策略",counter:null},
{type:"escape",name:"回到Full Guard",steps:["Knee shield创造空间","Shrimp远离","另一腿穿过建立full guard","锁闭脚踝"],tip:"退回full guard重来也完全可以",counter:null},
]},

// ──── GRIP FIGHTING ────
gripFighting:{name:"抢把体系",en:"Grip Fighting",role:"system",emoji:"🤝",
desc:"抢把（Grip Fighting）是BJJ中被严重低估的技能。谁先建立有利grip谁掌握主动权。这是所有guard work和passing的基础。",
pts:["先手优势：主动伸手抢把比被动防守更有效","断把（strip grip）优先级高于建立自己的grip","Gi抢把：袖口>衣领>裤腿>腰带（按优先级）","No-Gi抢把：collar tie > wrist > 2-on-1 > underhook","每次断把后立刻建立自己的grip——不要留空档","双手都被控制=极度危险——必须立刻断至少一个"],
chains:[
{type:"grip",name:"Gi袖口控制",steps:["四指在外拇指在内抓袖口","抓靠近手腕位置最有效","拉袖口向下→破坏对手姿势","拉袖口向侧→限制对手一侧手臂活动","配合脚踩二头肌→进入spider guard"],tip:"袖口是Gi柔术最重要的grip——控制袖口=控制对手手臂",counter:{name:"断袖口方法",steps:["用另一手握住自己被控手腕","向对手拇指方向猛拉抽出","或用脚踩对手抓握的手指方向剥离"]}},
{type:"grip",name:"衣领控制 Collar Grip",steps:["深抓对手后衣领（四指在内越深越好）","交叉抓领（cross collar）→绞技入口","同侧抓领→控制姿势+设置sweep","双手抓领→强力posture控制"],tip:"衣领越深威胁越大——深到手腕骨接触颈部就是绞技距离",counter:{name:"断衣领方法",steps:["双手抓住对手抓领的手腕向下拉脱","肘部内收缩小空间不让对手深入","另一手握住对手手腕朝其拇指方向剥离"]}},
{type:"grip",name:"No-Gi: Collar Tie",steps:["一手抓对手后颈（collar tie）","拉其头部向下→破坏姿势","配合另一手控制手腕/肘部","可以设置snap down/arm drag/前滚翻入guard"],tip:"No-Gi中collar tie相当于Gi的衣领控制",counter:{name:"Collar Tie防御",steps:["被抓后颈时立刻同侧手做frame推对手肘部","头部上抬抵抗下拉力","反手也抓对手后颈形成对称控制→谁先打破平衡谁赢"]}},
{type:"grip",name:"2-on-1 / Russian Tie",steps:["双手控制对手一只手臂","一手抓手腕一手抓肘/三头肌","将对手手臂拉过你身体","可以直接→arm drag→back take","或→duck under→back take"],tip:"2-on-1是No-Gi最强力的控制——对手一只手完全被废掉",counter:{name:"2-on-1防御",steps:["被控手臂立刻向身体收回","另一手抓住对手控制手的手腕","旋转身体面对对手","夺回手臂控制"]}},
{type:"grip",name:"Underhook/Whizzer战争",steps:["Underhook：手穿对手腋下抱背→进攻位","Whizzer：对手拿到underhook后的反控→手臂从外侧压住","Underhook>Whizzer是一般规律","但高水平whizzer可以反转局面→whizzer+hip switch→back take"],tip:"Underhook vs Whizzer是半防守和站立中最重要的对抗",counter:null},
{type:"grip",name:"Pant Grip裤腿控制",steps:["抓对手膝盖附近裤腿","限制对手腿部移动","配合另一手控制→多种sweep入口","DLR中抓脚踝是必要控制"],tip:"裤腿控制是扫技的隐藏钥匙——很多sweep靠裤腿grip完成",counter:{name:"断裤腿方法",steps:["被抓裤腿侧腿猛力后撤","手向下掰对手手指方向剥离","后撤同时前进施压pass"]}},
]},

// ──── PIN / CONTROL ────
sideControl:{name:"侧面控制",en:"Side Control",role:"top",emoji:"⬛",
desc:"身体垂直压在对手胸部上方。最常见的控制位，向多方向transition和submission选项丰富。",
pts:["体重沉在对手胸口——胸对胸压力","Crossface控制对手头朝向","膝盖顶住近侧髋部阻止转身","先稳定再进攻","用小幅度调整维持压力"],
chains:[

{type:"submission",name:"木村锁 Kimura",steps:["控制近侧手腕","从上臂外侧穿过figure-4","可能需step over头部增控","身体旋转力量完成"],tip:"力量来自身体转动。Finish不了→Kimura grip本身也是好控制",counter:{name:"逃脱",steps:["手臂贴紧身体不给角度","抓自己Gi锚定","翻身减压+shrimp"]}},
{type:"submission",name:"棒球棒绞 Baseball Bat",steps:["一手深抓远侧衣领（四指朝内）","另一手抓近侧衣领（四指朝外）","双手如握棒球棒","滑到N/S方向→胸口压低收手完成"],tip:"很多人在pass过程中就埋好grip到位直接finish",counter:{name:"逃脱",steps:["感觉抓领时立刻掰开grip","下巴内收","向对手移动方向转身减压"]}},
{type:"transition",name:"过渡Mount",steps:["体重移到上体","远侧膝盖沿地面滑过","越过腹部到另一侧","坐稳mount"],tip:"过渡时胸口压力不中断——抬身对手就插膝盖",counter:{name:"防御",steps:["膝盖滑过时肘膝连接","膝盖顶住来的腿","Shrimp制造空间→half guard"]}},
{type:"transition",name:"KOB膝盖压腹",steps:["侧控提起上体","近侧膝盖放对手腹部","另一脚外撑","一手控领一手抓裤"],tip:"KOB是逼迫反应的位置——每种反应都有对应进攻",counter:{name:"KOB逃脱",steps:["双手推膝盖向远侧","同时髋部转向对手","推过身体恢复guard"]}},
{type:"transition",name:"N/S南北位",steps:["向对手头部旋转180度","胸口压住脸部","双手控手臂","可上N/S choke"],tip:"旋转时贴着身体。N/S压力非常窒息",counter:null},
]},

sideControlBottom:{name:"侧控逃脱",en:"Side Control Bottom",role:"bottom",emoji:"😰",
desc:"被侧面控制很不利。Frame住→制造空间→恢复guard。",
pts:["不要平躺——侧身面向对手","Frame：近侧前臂顶颈，远侧手推髋——用骨骼支撑","下巴内收保护颈","对手越急着attack越容易出空间"],
chains:[
{type:"escape",name:"虾行逃脱 Shrimp",steps:["Frame住颈+推髋","Bridge顶起对手","趁空间shrimp远离","膝盖插入→half guard或full guard"],tip:"Bridge+Shrimp组合动作。一次不够连续多次",counter:null},
{type:"escape",name:"翻桥逃脱 Bridge & Roll",steps:["控制对手远侧手臂拉到身边","同侧脚勾对手同侧腿","爆发bridge向被控侧","翻到top"],tip:"时机：对手专注attack时重心前移",counter:null},
{type:"escape",name:"Ghost Escape幽灵逃脱",steps:["对手从侧控转向N/S时","利用旋转瞬间空间","身体向同方向滑出","从对手身下穿出→恢复guard或背后"],tip:"顺着对手的旋转走——像'顺水游'",counter:null},
{type:"escape",name:"Underhook逃脱",steps:["近侧手穿到对手腋下拿underhook","身体侧身","Underhook力量从下方穿出","到dog fight/half guard/single leg"],tip:"拿到underhook=拿到生命线",counter:null},
]},

{type:"submission",name:"Americana from Kesa",steps:["近侧手臂被夹腋下","腾出手按手腕向地面","Figure-4锁","利用体重提腕"],tip:"Kesa控制力极强对手很难防守americana",counter:{name:"逃脱",steps:["手抓自己腰带锚定","另一手推解figure-4"]}},

{type:"transition",name:"过渡Mount",steps:["搂头改为crossface","后腿越过对手身体","利用髋部接触滑动","建立mount"],tip:"从Kesa到mount比标准侧控更近",counter:null},

kesaBottom:{name:"被浮固逃脱",en:"Kesa Bottom",role:"bottom",emoji:"😤",

chains:[
{type:"escape",name:"背后翻转",steps:["被困手臂尽量向对手后方移动","另一手推对手后腰","Bridge向对手背部方向","利用后方无base弱点翻倒","到top"],tip:"方向是关键——向对手后脑方向翻",counter:null},
{type:"escape",name:"抽手→反背",steps:["被困手臂向下（朝自己髋部）抽","配合bridge制造空间","手自由后立刻建立frame","shrimp→恢复guard 或 绕到对手背后"],tip:"手臂自由后不要停——立刻进入下一步",counter:null},
{type:"escape",name:"坐起反控",steps:["自由手绕到对手后方抓腰带","用grip辅助坐起来","身体向对手背后移动","打破kesa控制"],tip:"需要core力量和时机——对手放松压力瞬间坐起",counter:null},

// ──── MOUNT ────
mount:{name:"骑乘",en:"Mount",role:"top",emoji:"👑",

chains:[
{type:"submission",name:"Armbar from Mount",steps:["向高位mount移动","控制目标手腕","攻击侧脚踩头旁","另一腿过脸","后倒夹紧髋上顶"],tip:"Mount armbar最关键是不要丢位置——腿夹紧",counter:{name:"逃脱",steps:["被控手弯曲抓自己另一手","向被攻击侧翻身","手臂沿腿滑出"]}},
{type:"submission",name:"Cross Choke十字绞",steps:["一手深插远侧衣领","另一手也抓衣领","X形交叉","肘内收前臂骨顶颈两侧"],tip:"Roger Gracie凭这一招横扫——因为第一手永远够深",counter:{name:"防御",steps:["双手拉对手深入的手腕","不让第二手也进衣领","Bridge把手掰出"]}},
{type:"submission",name:"Ezekiel绞",steps:["一手从头下穿到另侧","穿过的手抓自己袖口内侧","被抓袖口手刀横切喉咙","穿过手上提+切的手下压"],tip:"Mount隐藏杀招——对手全力防cross choke时不预料",counter:{name:"逃脱",steps:["双手推前臂远离颈","下巴内收","Trap & Roll逃脱mount"]}},
{type:"transition",name:"Back Take",steps:["对手翻身趴下试图逃脱时","顺势滑到背后","建立seatbelt+hooks"],tip:"对手翻身=送背。故意施压让对手想翻身然后顺势拿",counter:null},
]},

mountBottom:{name:"被骑乘逃脱",en:"Mount Bottom",role:"bottom",emoji:"😫",
desc:"被骑乘是最危险位置之一。保护手臂颈部、系统逃脱。",
pts:["T-Rex手臂：肘贴身。绝不伸直推","逃脱优先：肘膝逃脱(高%)>trap&roll(爆发)","保持呼吸不恐慌"],
chains:[
{type:"escape",name:"肘膝逃脱 Elbow-Knee",steps:["肘部护身两侧","一侧肘向下和膝盖连接","Small bridge制造空间","Shrimp膝盖插入→half guard","连续3-4次即可逃出"],tip:"最高百分比——即使对方比你大很多也能用",counter:null},
{type:"escape",name:"陷阱翻桥 Trap & Roll",steps:["同侧手抓对手手腕","同侧脚勾对手脚","两个控制点到位后","爆发bridge向被困侧翻转"],tip:"手脚必须同时trap。最佳时机是对手伸手attack时",counter:null},
{type:"escape",name:"高位Mount降级",steps:["对手到高位mount（坐胸口）","不要急着逃——先推回低位","双手推膝盖/髋+shrimp","回到低位后执行标准逃脱"],tip:"高位→低位→逃脱是正确策略",counter:null},
]},

// ──── BACK ────
backControl:{name:"背部控制",en:"Back Control",role:"top",emoji:"🏆",
desc:"BJJ王者位置。对手看不到你、无法有效防守。",
pts:["Seatbelt：choking hand过肩绕颈+另一手穿腋下","双hooks脚跟勾大腿内侧","身体偏向choking hand侧","Body triangle是hooks的高阶替代"],
chains:[
{type:"submission",name:"裸绞 RNC",steps:["Choking hand需绕过颈部——最难一步","方法：拨手/强行插/切换角度创造空间","前臂贴紧颈动脉","Choking手放另一手二头肌","另一手放后脑","夹肘+胸口前挺完成"],tip:"力量来自胸口膨胀+肘内收不是手臂挤",counter:{name:"RNC逃脱",steps:["双手抓choking hand手腕下拉","下巴内收到锁骨","向choking hand方向转","拉到下巴以下后转身面对"]}},
{type:"submission",name:"弓箭绞 Bow & Arrow",steps:["Choking hand深抓远侧衣领","另一手抓同侧裤腿膝弯处","取出一侧hook踩髋","身体向后伸展——拉领+拉腿如拉弓","颈部被衣领绞紧"],tip:"Finish率最高的绞杀之一。衣领grip至少过对手中线",counter:{name:"弓箭绞逃脱",steps:["第一时间双手抓衣领hand手腕下拉","身体向对手方向旋转减轻拉力","背部平贴地面消除弓的张力","趁角度失效转身面对"]}},
{type:"submission",name:"Collar Choke",steps:["RNC绕不过时直接抓衣领","前臂骨顶颈一侧","另一手辅助拉领或抱头","身体偏移施压"],tip:"不一定非要RNC——collar choke从背后也非常有效",counter:null},
{type:"transition",name:"丢背控→Mount",steps:["对手摘hooks开始转身时","顺势让对手翻到面朝上","直接到mount"],tip:"丢背控≠失败——过渡mount仍在上位",counter:null},
]},

backBottom:{name:"被背控逃脱",en:"Back Bottom",role:"bottom",emoji:"🆘",

{type:"transition",name:"进入Leg Lock的入口",steps:["从DLR→释放hook进入SLX/X-guard→Ashi","从half guard bottom→对手pass时缠腿→outside ashi","从top→对手做inverting逃脱时→抓腿进入ashi","从50/50→比赛中常见","Standing→imanari roll→直接进入ashi garami"],tip:"腿锁不是独立系统——要和整个BJJ game融合。最好的leg locker也有很强的passing和guard",counter:null},

{type:"sweep",name:"Berimbolo扫技",steps:["翻滚过程中对手base很好拿不到背","利用翻滚momentum","将对手向一侧扫倒","跟到top position"],tip:"拿不到back也没关系——扫到top也是好结果",counter:null},

// ═══════════════════════════════════════════════════════════
//  RENDER ENGINE
// ═══════════════════════════════════════════════════════════
const $=id=>document.getElementById(id);
const app=$('app');
let state={view:'home',posKey:null,chainIdx:null,filter:'all',search:'',tab:'positions'};

function tag(label,color){return `<span class="tag" style="background:${color}20;color:${color}">${label}</span>`}
function roleTag(role){const r=ROLE[role];return tag(r.label,r.color)}
function typeTag(type){const t=TYPE[type];return tag(t.label,t.color)}

function stepTimeline(steps,color){
  return steps.map((s,i)=>`
    <div class="step">
      <div class="step-dot-col">
        <div class="step-dot" style="background:${color}20;border:2px solid ${color};color:${color}">${i+1}</div>
        ${i<steps.length-1?`<div class="step-line" style="background:${color}22"></div>`:''}
      </div>
      <div class="step-text">${typeof s==='string'?s:`<div class="step-title">${s.step}</div><div class="step-detail">${s.detail}</div>`}</div>
    </div>
  `).join('');
}

function counterBox(counter){
  if(!counter)return '';
  return `
    <div class="counter-box">
      <div class="counter-title">🏃 逃脱/反制：${counter.name}</div>
      ${stepTimeline(counter.steps,'#22c55e')}
    </div>
  `;
}

function renderHome(){
  const positions=Object.entries(DATA);
  const s=state.search.toLowerCase();
  const filtered=positions.filter(([,v])=>{
    const roleMatch=state.filter==='all'||v.role===state.filter;
    if(!s)return roleMatch;
    const nm=v.name.includes(s)||v.en.toLowerCase().includes(s);
    const cm=v.chains.some(c=>c.name.toLowerCase().includes(s)||c.name.includes(s));
    return roleMatch&&(nm||cm);
  });
  const totalChains=filtered.reduce((a,[,v])=>a+v.chains.length,0);

  app.innerHTML=`
    <div class="header fade-up">
      <div class="icon">🥋</div>
      <h1>巴柔武器库</h1>
      <div class="sub">BJJ Arsenal · 训练前预习速查</div>
    </div>
    <input class="search-bar" id="searchInput" type="text" placeholder="搜索位置或技术… (armbar, 蝴蝶, DLR, kimura, 腿锁...)" value="${state.search}">
    <div class="filters">
      ${['all','guard','top','bottom','system'].map(k=>{
        const labels={all:'全部',guard:'🛡 防守',top:'⬆ 上位',bottom:'⬇ 下位',system:'📐 体系'};
        return `<button class="filter-btn ${state.filter===k?'active':''}" data-filter="${k}">${labels[k]}</button>`;
      }).join('')}
    </div>
    <div class="stats"><span>${filtered.length} 个位置/体系</span><span>·</span><span>${totalChains} 个技术</span></div>
    <div>
      ${filtered.map(([key,pos])=>{
        const counts={};
        pos.chains.forEach(c=>{counts[c.type]=(counts[c.type]||0)+1});
        const meta=Object.entries(counts).map(([t,n])=>`<span style="color:${TYPE[t].color}">${TYPE[t].icon}${n}</span>`).join('');
        return `
          <button class="pos-card fade-up" data-pos="${key}" style="animation-delay:${filtered.indexOf(filtered.find(f=>f[0]===key))*0.03}s">
            <div class="emoji">${pos.emoji}</div>
            <div class="info">
              <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
                <span class="name">${pos.name}</span>
                ${roleTag(pos.role)}
              </div>
              <div class="name-en">${pos.en}</div>
              <div class="meta">${meta}</div>
            </div>
            <div class="arrow">›</div>
          </button>
        `;
      }).join('')}
      ${filtered.length===0?'<div style="text-align:center;padding:40px;color:#475569;font-size:14px">没有找到匹配的位置或技术</div>':''}
    </div>
    <div class="footer">${Object.keys(DATA).length} 个位置/体系 · 训练前5分钟速览<br>白带至蓝带核心技术体系 + 腿锁 & Berimbolo</div>
  `;

  $('searchInput').addEventListener('input',e=>{state.search=e.target.value;renderHome()});
  document.querySelectorAll('[data-filter]').forEach(b=>b.addEventListener('click',()=>{state.filter=b.dataset.filter;renderHome()}));
  document.querySelectorAll('[data-pos]').forEach(b=>b.addEventListener('click',()=>{state.posKey=b.dataset.pos;state.chainIdx=null;renderPosition()}));
}

function renderPosition(){
  const pos=DATA[state.posKey];
  const typeOrder=['submission','sweep','escape','transition','control','grip'];

  app.innerHTML=`
    <button class="back-btn" id="backHome">← 全部位置</button>
    <div class="detail-card fade-up">
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:10px">
        <span style="font-size:36px">${pos.emoji}</span>
        <div style="flex:1">
          <h2 style="font-size:22px;font-weight:800">${pos.name}</h2>
          <div style="font-size:12px;color:var(--text-dark)">${pos.en}</div>
        </div>
        ${roleTag(pos.role)}
      </div>
      <p style="font-size:13px;line-height:1.9;color:var(--text-dim)">${pos.desc}</p>
    </div>

    <div class="detail-card fade-up" style="background:rgba(212,168,83,.04);border-color:rgba(212,168,83,.12);animation-delay:.05s">
      <div class="section-title">📌 位置要点</div>
      ${pos.pts.map((p,i)=>`<div class="key-point"><span class="num">${i+1}.</span><span class="text">${p}</span></div>`).join('')}
    </div>

    <div class="section-title" style="margin-top:20px">⛓️ 技术链 · 点击查看详细步骤</div>
    ${typeOrder.map(type=>{
      const chains=pos.chains.map((c,i)=>({...c,idx:i})).filter(c=>c.type===type);
      if(!chains.length)return '';
      const tc=TYPE[type];
      return `
        <div class="cat-header" style="color:${tc.color}">${tc.icon} ${tc.label} (${chains.length})</div>
        ${chains.map(chain=>`
          <button class="chain-card" data-chain="${chain.idx}" style="border:1px solid ${tc.color}18;background:${tc.color}06">
            <div style="flex:1">
              <div class="chain-name">${chain.name}</div>
              <div class="chain-meta">${chain.steps.length} 步${chain.counter?' · 含逃脱':''}</div>
            </div>
            <span style="color:#334155;font-size:16px">›</span>
          </button>
        `).join('')}
      `;
    }).join('')}
  `;

  $('backHome').addEventListener('click',()=>{state.posKey=null;renderHome()});
  document.querySelectorAll('[data-chain]').forEach(b=>b.addEventListener('click',()=>{state.chainIdx=parseInt(b.dataset.chain);renderChain()}));
}

function renderChain(){
  const pos=DATA[state.posKey];
  const chain=pos.chains[state.chainIdx];
  const tc=TYPE[chain.type];

  // Related chains
  const related=pos.chains.map((c,i)=>({...c,idx:i})).filter(c=>c.idx!==state.chainIdx);

  app.innerHTML=`
    <button class="back-btn" id="backPos">← ${pos.name}</button>
    <div class="detail-card fade-up">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">
        <span style="font-size:24px">${tc.icon}</span>
        <div>
          <div style="font-size:20px;font-weight:800">${chain.name}</div>
          <div style="display:flex;gap:8px;margin-top:4px;align-items:center">
            ${typeTag(chain.type)}
            <span style="font-size:11px;color:var(--text-dark)">从 ${pos.name} 出发</span>
          </div>
        </div>
      </div>
    </div>

    <div class="section-title">动作步骤</div>
    <div class="fade-up" style="margin-bottom:16px;animation-delay:.05s">
      ${stepTimeline(chain.steps,tc.color)}
    </div>

    <div class="tip-box fade-up" style="animation-delay:.1s">
      <div class="tip-label">💡 要点提示</div>
      <div class="tip-text">${chain.tip}</div>
    </div>

    ${counterBox(chain.counter)}

    <div style="margin-top:20px">
      <div style="font-size:12px;color:var(--text-dark);margin-bottom:10px">同位置其他技术：</div>
      <div class="nav-chips">
        ${related.map(c=>`
          <button class="nav-chip" data-chain="${c.idx}" style="border:1px solid ${TYPE[c.type].color}30;background:${TYPE[c.type].color}10;color:${TYPE[c.type].color}">
            ${TYPE[c.type].icon} ${c.name.length>12?c.name.substring(0,12)+'…':c.name}
          </button>
        `).join('')}
      </div>
    </div>
  `;

  $('backPos').addEventListener('click',()=>{state.chainIdx=null;renderPosition()});
  document.querySelectorAll('[data-chain]').forEach(b=>b.addEventListener('click',()=>{state.chainIdx=parseInt(b.dataset.chain);renderChain();window.scrollTo(0,0)}));
}

// Init
renderHome();
</script>
</body>
</html>
